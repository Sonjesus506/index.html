<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Coin Airdrop Platform</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .coin { width: 200px; height: 200px; background: radial-gradient(#f3ba2f, #947116); border-radius: 50%; margin: 20px auto; border: 8px solid #ffe066; box-shadow: 0 0 50px rgba(243, 186, 47, 0.5); cursor: pointer; transition: transform 0.1s; }
        .coin:active { transform: scale(0.95); }
        .countdown { font-size: 20px; color: #f3ba2f; margin: 20px; text-align: center; }
        .nav-grid { display: flex; justify-content: space-around; margin-top: 30px; }
        .task-card { background: #1a1a1a; padding: 15px; border-radius: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .btn-claim { background: #f3ba2f; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Countdown Section -->
    <div class="countdown" id="timer">Loading Airdrop...</div>

    <!-- Main Coin -->
    <div class="coin" id="main-coin"></div>
    <div style="text-align: center; font-size: 24px;">Coins: <span id="balance">0</span></div>

    <!-- Daily Task & Social Tasks -->
    <div id="tasks">
        <h3>Daily Rewards</h3>
        <div class="task-card">
            <span>Daily Login Bonus</span>
            <button class="btn-claim" onclick="claimDaily()">Claim</button>
        </div>
        <h3>Social Tasks</h3>
        <div class="task-card">
            <span>Follow on Instagram (+500)</span>
            <button class="btn-claim" onclick="completeTask(500)">Follow</button>
        </div>
    </div>

    <!-- Binance Airdrop Tab -->
    <div style="margin-top:40px; border-top: 1px solid #333; padding-top: 20px;">
        <h2>Binance Airdrop</h2>
        <button style="width: 100%; padding: 15px; background: #000; border: 2px solid #f3ba2f; color: #f3ba2f;" onclick="connectWallet()">Connect Binance Wallet</button>
    </div>

    <script>
        // 1. Countdown to November
        const countdownDate = new Date("Nov 1, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const distance = countdownDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById("timer").innerHTML = `Airdrop in: ${days} days`;
        }, 1000);

        // 2. Logic za Coins
        let score = parseInt(localStorage.getItem('balance')) || 0;
        document.getElementById('balance').innerText = score;

        document.getElementById('main-coin').addEventListener('touchstart', (e) => {
            score += 1;
            document.getElementById('balance').innerText = score;
            localStorage.setItem('balance', score);
        });

        // 3. Daily Task Logic
        let dailyStreak = parseInt(localStorage.getItem('streak')) || 0;
        function claimDaily() {
            let reward = (dailyStreak + 1) * 100;
            score += reward;
            dailyStreak++;
            localStorage.setItem('balance', score);
            localStorage.setItem('streak', dailyStreak);
            alert("Umevuna " + reward + " coins!");
            location.reload();
        }

        // 4. Social Task Logic
        function completeTask(amount) {
            score += amount;
            localStorage.setItem('balance', score);
            alert("Task imekamilika! Umeongezewa " + amount + " coins.");
            location.reload();
        }

        // 5. Binance Connection
        function connectWallet() {
            alert("Binance Web3 Wallet Inajaribu kuunganisha...");
            // Hapa utaongeza link ya API yako ya wallet
        }
    </script>
</body>
</html>
