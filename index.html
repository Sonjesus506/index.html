<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>E-Coin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            color: #f0e6d0;
            position: fixed;
        }
        .app {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #12100d 0%, #1a1610 40%, #0e0c07 100%);
            display: flex;
            flex-direction: column;
            padding: 8px 12px 6px;
            overflow: hidden;
            position: relative;
        }
        /* Glow effects */
        .app::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 50% 20%, rgba(243, 186, 47, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(26, 22, 16, 0.8);
            padding: 4px 14px 4px 6px;
            border-radius: 40px;
            border: 1px solid rgba(243, 186, 47, 0.3);
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(10px);
        }
        .user-info:active {
            transform: scale(0.95);
        }
        .avatar {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0e0c07;
            font-size: 13px;
            overflow: hidden;
            border: 2px solid rgba(243, 186, 47, 0.3);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-info span {
            font-weight: 600;
            font-size: 12px;
            color: #e5d6b0;
        }
        .badge {
            background: linear-gradient(135deg, #2f2a1a, #1f1a0f);
            color: #f3ba2f;
            padding: 3px 12px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid rgba(243, 186, 47, 0.2);
        }
        .balance-card {
            background: linear-gradient(135deg, #1a1610, #221d15);
            border-radius: 20px;
            padding: 12px 14px 10px;
            text-align: center;
            border: 1px solid rgba(243, 186, 47, 0.15);
            margin-bottom: 6px;
            flex-shrink: 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(243, 186, 47, 0.05);
            position: relative;
            z-index: 1;
        }
        .balance-card .label {
            font-size: 9px;
            color: #b0945a;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .balance-card .amount {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fad974, #f3ba2f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            text-shadow: 0 0 60px rgba(243, 186, 47, 0.15);
            letter-spacing: 1px;
        }
        .balance-card .stats {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 4px;
            font-size: 10px;
            color: #bdaa7a;
        }
        .balance-card .stats span {
            background: rgba(14, 12, 7, 0.6);
            padding: 2px 14px;
            border-radius: 40px;
            border: 1px solid rgba(47, 40, 28, 0.5);
        }
        .level-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(26, 22, 16, 0.6);
            border-radius: 30px;
            padding: 4px 14px 4px 16px;
            border: 1px solid rgba(243, 186, 47, 0.1);
            margin-bottom: 6px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }
        .level-row .level-badge {
            font-size: 12px;
            font-weight: 600;
            color: #f3ba2f;
        }
        .level-row .level-badge span {
            color: #e5d6b0;
            font-weight: 400;
        }
        .level-row .next-level {
            font-size: 10px;
            color: #8a7a54;
        }
        .timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .timer-item {
            background: rgba(25, 21, 15, 0.7);
            border-radius: 14px;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid rgba(45, 36, 23, 0.5);
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        .timer-item:active {
            background: rgba(42, 34, 21, 0.8);
            transform: scale(0.96);
        }
        .timer-item .value {
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .timer-item .desc {
            font-size: 7px;
            text-transform: uppercase;
            color: #8a7a54;
            letter-spacing: 0.5px;
            margin-top: 2px;
            font-weight: 600;
        }
        .tap-limit-bar {
            background: rgba(14, 12, 7, 0.6);
            border-radius: 30px;
            padding: 4px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(47, 40, 28, 0.3);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }
        .tap-limit-bar .label {
            font-size: 8px;
            color: #8a7a54;
            font-weight: 600;
        }
        .tap-limit-bar .value {
            font-size: 11px;
            font-weight: 700;
            color: #f3ba2f;
        }
        .tap-limit-bar .fill {
            width: 80px;
            height: 4px;
            background: rgba(42, 34, 21, 0.6);
            border-radius: 10px;
            overflow: hidden;
        }
        .tap-limit-bar .fill .bar {
            height: 100%;
            background: linear-gradient(90deg, #f3ba2f, #ff6b6b);
            border-radius: 10px;
            transition: width 0.5s;
        }
        .progress-row {
            background: rgba(26, 22, 16, 0.6);
            border-radius: 40px;
            padding: 4px 14px 4px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(47, 40, 28, 0.3);
            margin-bottom: 6px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }
        .progress-row .left {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            flex: 1;
            color: #8a7a54;
        }
        .progress-row .left .fill {
            flex: 1;
            height: 4px;
            background: rgba(42, 34, 21, 0.6);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-row .left .fill .bar {
            height: 100%;
            background: linear-gradient(90deg, #f3ba2f, #d49c1a);
            border-radius: 10px;
            transition: width 0.3s;
        }
        .progress-row .right {
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            color: #0e0c07;
            font-weight: 700;
            padding: 3px 16px;
            border-radius: 30px;
            font-size: 10px;
            cursor: pointer;
            transition: 0.08s;
            box-shadow: 0 3px 0 #876a1a;
            border: none;
            flex-shrink: 0;
        }
        .progress-row .right:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #876a1a;
        }
        .coin-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
            position: relative;
            margin: 2px 0;
            overflow: visible;
            touch-action: none;
            z-index: 1;
        }
        .coin {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 35% 30%, #fce181, #d49c1a 45%, #b8860b 70%, #8a6b0e);
            border-radius: 50%;
            border: 8px solid #f9d342;
            box-shadow: 0 0 0 3px rgba(107, 79, 14, 0.5), 0 12px 60px rgba(243, 186, 47, 0.3), inset 0 -10px 30px rgba(0,0,0,0.5), inset 0 10px 30px rgba(255,215,0,0.15);
            cursor: pointer;
            transition: transform 0.06s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            touch-action: none;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .coin::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.1);
            pointer-events: none;
        }
        .coin::after {
            content: 'E';
            position: relative;
            z-index: 1;
            font-size: 5.5rem;
            font-weight: 900;
            color: #7a5f0e;
            text-shadow: 0 2px 4px rgba(255,215,0,0.2), 0 -2px 4px rgba(0,0,0,0.3);
            font-family: 'Georgia', serif;
        }
        .coin:active {
            transform: scale(0.88);
        }
        .coin.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .float-text {
            position: absolute;
            font-size: 2.2rem;
            font-weight: 800;
            color: #f3ba2f;
            text-shadow: 0 0 20px #f3ba2f, 0 0 40px #f3ba2f80, 0 0 60px #f3ba2f40;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 0.9s ease-out forwards;
            font-family: 'Segoe UI', sans-serif;
        }
        .float-text.super {
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b80, 0 0 60px #ff6b6b40;
            font-size: 3rem;
        }
        .float-text.tap-limit {
            color: #ffd93d;
            text-shadow: 0 0 20px #ffd93d, 0 0 40px #ffd93d80;
            font-size: 1.8rem;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8) rotate(-5deg); }
            30% { opacity: 1; transform: translateY(-20px) scale(1.1) rotate(3deg); }
            100% { opacity: 0; transform: translateY(-140px) scale(1.3) rotate(0deg); }
        }
        .coin-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            flex-shrink: 0;
            margin-top: 2px;
            position: relative;
            z-index: 1;
        }
        .ceo-tag {
            background: rgba(31, 26, 15, 0.8);
            padding: 2px 14px 2px 10px;
            border-radius: 40px;
            font-size: 10px;
            border: 1px solid rgba(61, 50, 31, 0.4);
            color: #d4bb7a;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .ceo-tag span {
            color: #f3ba2f;
            font-weight: 600;
        }
        .small-balance {
            font-size: 11px;
            color: #8a7a54;
            font-weight: 600;
        }
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 4px;
            margin-bottom: 6px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .action-btn {
            background: rgba(26, 22, 16, 0.6);
            border: 1px solid rgba(47, 40, 28, 0.3);
            border-radius: 30px;
            padding: 6px 0;
            text-align: center;
            font-weight: 700;
            font-size: 9px;
            color: #e5d6b0;
            cursor: pointer;
            transition: 0.08s;
            box-shadow: 0 2px 0 rgba(10, 8, 6, 0.3);
            border: none;
            backdrop-filter: blur(10px);
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 rgba(10, 8, 6, 0.3);
        }
        .action-btn.gold {
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            color: #0b0a08;
            box-shadow: 0 2px 0 #876a1a;
        }
        .action-btn.gold:active {
            background: linear-gradient(135deg, #dbaa24, #b8860b);
        }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: rgba(20, 17, 13, 0.8);
            border-radius: 40px;
            padding: 4px 6px;
            border: 1px solid rgba(47, 40, 28, 0.3);
            flex-shrink: 0;
            margin-top: 2px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3px 6px;
            border-radius: 30px;
            font-size: 8px;
            color: #7a6a4a;
            cursor: pointer;
            background: transparent;
            border: none;
            font-weight: 600;
            gap: 0px;
            transition: 0.1s;
            flex: 1;
        }
        .nav-item .icon {
            font-size: 14px;
            line-height: 1;
        }
        .nav-item.active {
            color: #f3ba2f;
            background: rgba(30, 26, 18, 0.6);
        }
        .nav-item:active {
            opacity: 0.6;
        }
        .footer-airdrop {
            text-align: center;
            font-size: 8px;
            color: #4d3f28;
            letter-spacing: 1px;
            border-top: 1px solid rgba(31, 26, 16, 0.3);
            padding-top: 3px;
            flex-shrink: 0;
            margin-top: 2px;
            position: relative;
            z-index: 1;
        }
        .footer-airdrop span {
            background: rgba(26, 22, 16, 0.6);
            padding: 1px 16px;
            border-radius: 40px;
            border: 1px solid rgba(47, 40, 28, 0.2);
            color: #f3ba2f;
            backdrop-filter: blur(10px);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: linear-gradient(145deg, #1a1610, #12100d);
            border: 1px solid rgba(61, 50, 31, 0.4);
            border-radius: 30px;
            padding: 20px 16px 16px;
            max-width: 360px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
        }
        .modal-box h2 {
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.2rem;
            margin-bottom: 12px;
            text-align: center;
        }
        .modal-box p {
            color: #bdaa7a;
            font-size: 12px;
            margin-bottom: 8px;
            text-align: center;
        }
        .modal-box .close-btn {
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            border: none;
            padding: 8px;
            border-radius: 40px;
            font-weight: 700;
            color: #0e0c07;
            width: 100%;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-box .invite-link {
            background: rgba(14, 12, 7, 0.6);
            padding: 8px;
            border-radius: 14px;
            border: 1px solid rgba(47, 40, 28, 0.3);
            color: #f3ba2f;
            font-size: 12px;
            word-break: break-all;
            margin: 8px 0;
            text-align: center;
        }
        .modal-box .copy-btn {
            background: rgba(47, 40, 28, 0.6);
            border: none;
            padding: 5px 16px;
            border-radius: 30px;
            color: #f3ba2f;
            font-weight: 600;
            cursor: pointer;
            margin: 4px auto;
            display: block;
        }
        .modal-box .airdrop-info {
            background: rgba(14, 12, 7, 0.6);
            padding: 12px;
            border-radius: 14px;
            border: 1px solid rgba(47, 40, 28, 0.3);
            margin: 6px 0;
        }
        .modal-box .airdrop-info .row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 12px;
        }
        .modal-box .airdrop-info .row .label {
            color: #8a7a54;
        }
        .modal-box .airdrop-info .row .value {
            color: #f3ba2f;
            font-weight: 600;
        }
        .modal-box .boost-option {
            background: rgba(14, 12, 7, 0.6);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid rgba(47, 40, 28, 0.3);
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-box .boost-option button {
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            border: none;
            padding: 4px 14px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 11px;
            color: #0e0c07;
        }
        .modal-box .boost-option .cost {
            color: #8a7a54;
            font-size: 10px;
        }
        .modal-box .referral-bonus {
            background: linear-gradient(135deg, rgba(47, 40, 28, 0.4), rgba(26, 22, 16, 0.6));
            border: 1px solid rgba(243, 186, 47, 0.15);
            border-radius: 14px;
            padding: 10px;
            margin: 6px 0;
            text-align: center;
        }
        .modal-box .referral-bonus .big {
            font-size: 1.6rem;
            color: #f3ba2f;
            font-weight: 700;
        }
        .modal-box .referral-bonus .sub {
            font-size: 10px;
            color: #8a7a54;
        }
        .modal-box .social-links {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .modal-box .social-links a {
            color: #f3ba2f;
            text-decoration: none;
            background: rgba(14, 12, 7, 0.6);
            padding: 5px 12px;
            border-radius: 30px;
            border: 1px solid rgba(47, 40, 28, 0.3);
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
        }
        .modal-box .social-links a:hover {
            background: rgba(47, 40, 28, 0.4);
        }
        .modal-box .admin-badge {
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            color: #0e0c07;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            display: inline-block;
            margin: 4px auto;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }
        .user-profile .avatar-lg {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border: 2px solid rgba(243, 186, 47, 0.2);
        }
        .user-profile .avatar-lg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-profile .info {
            flex: 1;
        }
        .user-profile .info .name {
            color: #f3ba2f;
            font-weight: 700;
            font-size: 15px;
        }
        .user-profile .info .handle {
            color: #8a7a54;
            font-size: 11px;
        }
        .modal-box .verify-btn {
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin: 6px auto;
            display: block;
            font-size: 13px;
            color: #0e0c07;
        }
        .modal-box .settings-group {
            background: rgba(14, 12, 7, 0.6);
            padding: 10px;
            border-radius: 14px;
            border: 1px solid rgba(47, 40, 28, 0.3);
            margin: 6px 0;
        }
        .modal-box .settings-group .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(47, 40, 28, 0.2);
        }
        .modal-box .settings-group .setting-item:last-child {
            border-bottom: none;
        }
        .modal-box .settings-group .setting-item .label {
            color: #e5d6b0;
            font-size: 11px;
        }
        .modal-box .settings-group .setting-item input {
            background: rgba(14, 12, 7, 0.6);
            border: 1px solid rgba(47, 40, 28, 0.3);
            border-radius: 30px;
            padding: 3px 10px;
            color: #f0e6d0;
            font-size: 10px;
            width: 180px;
            outline: none;
        }
        .modal-box .settings-group .setting-item input:focus {
            border-color: #f3ba2f;
        }
        .modal-box .settings-group .setting-item button {
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            border: none;
            padding: 2px 12px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            font-size: 10px;
            color: #0e0c07;
        }
        @media (max-width: 420px) {
            .coin { width: 170px; height: 170px; }
            .coin::after { font-size: 4.5rem; }
            .balance-card .amount { font-size: 2.4rem; }
        }
        @media (max-width: 360px) {
            .coin { width: 150px; height: 150px; }
            .coin::after { font-size: 4rem; }
            .balance-card .amount { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="app" id="app">

    <div class="header">
        <div class="user-info" id="userInfo">
            <div class="avatar" id="avatarDisplay">👩</div>
            <span id="userNameDisplay">Jane (CEO)</span>
        </div>
        <div class="badge">Silver ▾</div>
    </div>

    <div class="balance-card">
        <div class="label">💰 BALANCE</div>
        <div class="amount" id="balanceDisplay">0</div>
        <div class="stats">
            <span>2 / 11</span>
            <span>⚡ +207 /h</span>
        </div>
    </div>

    <div class="level-row">
        <div class="level-badge">🏆 Level <span id="levelDisplay">1</span></div>
        <div class="next-level" id="nextLevelDisplay">Next: 1,000 coins</div>
    </div>

    <div class="timer-grid">
        <div class="timer-item" onclick="claimDaily()">
            <div class="value" id="dailyTimer">13:38</div>
            <div class="desc">Daily reward</div>
        </div>
        <div class="timer-item" onclick="claimCipher()">
            <div class="value" id="cipherTimer">08:38</div>
            <div class="desc">Daily cipher</div>
        </div>
        <div class="timer-item" onclick="claimCombo()">
            <div class="value" id="comboTimer">01:38</div>
            <div class="desc">Daily combo</div>
        </div>
    </div>

    <div class="tap-limit-bar">
        <span class="label">🔋 Taps Left</span>
        <div class="fill"><div class="bar" id="tapLimitBar" style="width:100%"></div></div>
        <span class="value" id="tapLimitDisplay">1,500</span>
    </div>

    <div class="progress-row">
        <div class="left">
            <span>$</span>
            <div class="fill"><div class="bar" id="progressBar" style="width:100%"></div></div>
        </div>
        <button class="right" id="boostBtn">Boost</button>
    </div>

    <div class="coin-wrapper" id="coinWrapper">
        <div class="coin" id="mainCoin" role="button" aria-label="Tap to earn"></div>
    </div>

    <div class="coin-label">
        <div class="ceo-tag" id="ceoTag">👑 (CEO) <span id="ceoCoinCount">0</span></div>
        <div class="small-balance">🪙 <span id="balanceSmall">0</span></div>
    </div>

    <div class="action-grid">
        <button class="action-btn gold" id="exchangeBtn">Exchange</button>
        <button class="action-btn" id="mineBtn">⛏️ Mine</button>
        <button class="action-btn" id="friendsBtn">👥 Friends</button>
        <button class="action-btn" id="earnBtn">🎯 Earn</button>
        <button class="action-btn" id="airdropBtn">Airdrop</button>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active"><span class="icon">🏠</span>Home</button>
        <button class="nav-item" onclick="openSettings()"><span class="icon">⚙️</span>Settings</button>
        <button class="nav-item"><span class="icon">🔔</span>Notif.</button>
        <button class="nav-item"><span class="icon">⚡</span>Activity</button>
    </div>

    <div class="footer-airdrop">
        <span>✦ Airdrop active ✦</span>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
        <h2 id="modalTitle">Modal</h2>
        <div id="modalContent"></div>
        <button class="close-btn" id="modalClose">Close</button>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // DOM
        const balanceDisplay = document.getElementById('balanceDisplay');
        const balanceSmall = document.getElementById('balanceSmall');
        const ceoCoinCount = document.getElementById('ceoCoinCount');
        const coinEl = document.getElementById('mainCoin');
        const coinWrapper = document.getElementById('coinWrapper');
        const dailyTimer = document.getElementById('dailyTimer');
        const cipherTimer = document.getElementById('cipherTimer');
        const comboTimer = document.getElementById('comboTimer');
        const progressBar = document.getElementById('progressBar');
        const boostBtn = document.getElementById('boostBtn');
        const levelDisplay = document.getElementById('levelDisplay');
        const nextLevelDisplay = document.getElementById('nextLevelDisplay');
        const ceoTag = document.getElementById('ceoTag');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const avatarDisplay = document.getElementById('avatarDisplay');
        const userInfo = document.getElementById('userInfo');
        const tapLimitBar = document.getElementById('tapLimitBar');
        const tapLimitDisplay = document.getElementById('tapLimitDisplay');

        const exchangeBtn = document.getElementById('exchangeBtn');
        const mineBtn = document.getElementById('mineBtn');
        const friendsBtn = document.getElementById('friendsBtn');
        const earnBtn = document.getElementById('earnBtn');
        const airdropBtn = document.getElementById('airdropBtn');

        const modalOverlay = document.getElementById('modalOverlay');
        const modalBox = document.getElementById('modalBox');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');

        // --- PERSISTENT STORAGE ---
        const STORAGE_KEY = 'eco_app_data_v12';

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    return data;
                }
            } catch (e) {}
            return null;
        }

        function saveData(data) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {}
        }

        // --- STATE ---
        const MAX_TAPS = 1500;
        let saved = loadData();
        let balance = saved?.balance || 0;
        let ceoCoins = saved?.ceoCoins || 0;
        let progress = saved?.progress || 1500;
        let tapPower = saved?.tapPower || 1;
        let boostLevel = saved?.boostLevel || 1;
        let dailyClaimed = saved?.dailyClaimed || false;
        let cipherClaimed = saved?.cipherClaimed || false;
        let comboClaimed = saved?.comboClaimed || false;
        let referrals = saved?.referrals || 0;
        let userName = saved?.userName || 'Jane';
        let tapsRemaining = saved?.tapsRemaining !== undefined ? saved.tapsRemaining : MAX_TAPS;
        let lastTapTime = saved?.lastTapTime || 0;
        let superTapActive = saved?.superTapActive || false;
        let superTapMultiplier = saved?.superTapMultiplier || 1;
        let superTapRemaining = saved?.superTapRemaining || 0;
        let customLinks = saved?.customLinks || [];
        let customTasks = saved?.customTasks || [];
        const maxProgress = 1500;

        // --- FUNCTIONS ---
        function getLevel(coins) {
            if (coins < 1000) return 1;
            return Math.floor(coins / 1000) + 1;
        }

        function getNextLevelThreshold(coins) {
            const current = getLevel(coins);
            return current * 1000;
        }

        function getBoostCost() {
            return 500 * Math.pow(2, boostLevel - 1);
        }

        function getTapRegenRate() {
            return 0.4;
        }

        function saveState() {
            saveData({
                balance: balance,
                ceoCoins: ceoCoins,
                progress: progress,
                tapPower: tapPower,
                boostLevel: boostLevel,
                dailyClaimed: dailyClaimed,
                cipherClaimed: cipherClaimed,
                comboClaimed: comboClaimed,
                referrals: referrals,
                userName: userName,
                tapsRemaining: tapsRemaining,
                lastTapTime: lastTapTime,
                superTapActive: superTapActive,
                superTapMultiplier: superTapMultiplier,
                superTapRemaining: superTapRemaining,
                customLinks: customLinks,
                customTasks: customTasks
            });
        }

        function updateUI() {
            const formatted = balance.toLocaleString();
            balanceDisplay.textContent = formatted;
            balanceSmall.textContent = formatted;
            ceoCoinCount.textContent = ceoCoins.toLocaleString();

            const pct = Math.min(100, (progress / maxProgress) * 100);
            progressBar.style.width = pct + '%';

            const newLevel = getLevel(balance);
            levelDisplay.textContent = newLevel;
            const nextThreshold = getNextLevelThreshold(balance);
            nextLevelDisplay.textContent = `Next: ${nextThreshold.toLocaleString()} coins`;

            const tapPct = Math.min(100, (tapsRemaining / MAX_TAPS) * 100);
            tapLimitBar.style.width = tapPct + '%';
            tapLimitDisplay.textContent = Math.floor(tapsRemaining).toLocaleString();

            if (tapsRemaining <= 0) {
                coinEl.classList.add('disabled');
            } else {
                coinEl.classList.remove('disabled');
            }

            saveState();
        }

        // --- TAP REGENERATION ---
        function regenerateTaps() {
            const now = Date.now();
            const timeSinceLastTap = (now - lastTapTime) / 1000;
            const regenRate = getTapRegenRate();
            const tapsToAdd = Math.floor(timeSinceLastTap / regenRate);
            
            if (tapsToAdd > 0 && tapsRemaining < MAX_TAPS) {
                tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + tapsToAdd);
                lastTapTime = now - (timeSinceLastTap % regenRate * 1000);
                updateUI();
            }
        }

        // --- MULTI-TOUCH SUPPORT ---
        function handleTap(e) {
            e.preventDefault?.();
            
            regenerateTaps();
            
            if (tapsRemaining <= 0) {
                showTapLimitMessage();
                return;
            }

            let amount = tapPower;
            let isSuper = false;
            
            if (superTapActive && superTapRemaining > 0) {
                amount = tapPower * superTapMultiplier;
                isSuper = true;
                const tapCost = Math.ceil(superTapMultiplier / 2);
                if (tapsRemaining < tapCost) {
                    showTapLimitMessage();
                    return;
                }
                tapsRemaining -= tapCost;
                superTapRemaining -= 1;
                if (superTapRemaining <= 0) {
                    superTapActive = false;
                    superTapMultiplier = 1;
                }
            } else {
                tapsRemaining -= 1;
                if (superTapActive && superTapRemaining <= 0) {
                    superTapActive = false;
                    superTapMultiplier = 1;
                }
            }

            balance += amount;
            ceoCoins += amount;
            if (progress < maxProgress) {
                progress = Math.min(maxProgress, progress + amount);
            }
            
            lastTapTime = Date.now();
            updateUI();

            const rect = coinEl.getBoundingClientRect();
            const wrapperRect = coinWrapper.getBoundingClientRect();
            const cx = rect.left - wrapperRect.left + rect.width / 2;
            const cy = rect.top - wrapperRect.top + 10;

            if (e.touches) {
                for (let i = 0; i < Math.min(e.touches.length, 3); i++) {
                    const touch = e.touches[i];
                    const tx = touch.clientX - wrapperRect.left;
                    const ty = touch.clientY - wrapperRect.top;
                    createFloatText(tx, ty, amount, isSuper);
                }
            } else {
                createFloatText(cx, cy, amount, isSuper);
            }

            coinEl.style.transform = 'scale(0.86)';
            setTimeout(() => coinEl.style.transform = '', 80);
        }

        function showTapLimitMessage() {
            const wrapperRect = coinWrapper.getBoundingClientRect();
            const cx = wrapperRect.width / 2;
            const cy = 20;
            const el = document.createElement('div');
            el.className = 'float-text tap-limit';
            el.textContent = '⏳ Wait...';
            el.style.left = (cx - 30) + 'px';
            el.style.top = (cy) + 'px';
            coinWrapper.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function createFloatText(x, y, amount, isSuper) {
            const el = document.createElement('div');
            el.className = 'float-text' + (isSuper ? ' super' : '');
            el.textContent = isSuper ? `×${amount}` : `+${amount}`;
            el.style.left = (x - 20) + 'px';
            el.style.top = (y - 10) + 'px';
            const offsetX = (Math.random() - 0.5) * 30;
            el.style.transform = `translateX(${offsetX}px)`;
            coinWrapper.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        // --- COIN EVENTS ---
        coinEl.addEventListener('click', (e) => handleTap(e));
        coinEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap(e);
        }, { passive: false });
        coinEl.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        // --- TAP REGENERATION INTERVAL ---
        setInterval(() => {
            regenerateTaps();
        }, 1000);

        // --- TIMERS ---
        function updateTimers() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            let diff = Math.max(0, (midnight - now) / 1000);
            const dh = Math.floor(diff / 3600);
            const dm = Math.floor((diff % 3600) / 60);
            dailyTimer.textContent = `${String(dh).padStart(2,'0')}:${String(dm).padStart(2,'0')}`;

            const secs = now.getSeconds();
            const fakeCipher = 60 - (secs % 60);
            cipherTimer.textContent = `00:${String(fakeCipher).padStart(2,'0')}`;

            const comboMin = Math.floor((secs % 30) / 2);
            const comboSec = secs % 30;
            comboTimer.textContent = `${String(comboMin).padStart(2,'0')}:${String(comboSec).padStart(2,'0')}`;

            const today = now.toDateString();
            const lastDate = localStorage.getItem('eco_last_date');
            if (lastDate !== today) {
                dailyClaimed = false;
                cipherClaimed = false;
                comboClaimed = false;
                tapsRemaining = MAX_TAPS;
                localStorage.setItem('eco_last_date', today);
                saveState();
                updateUI();
            }
        }

        // --- DAILY TASK CLAIMS ---
        function claimDaily() {
            if (dailyClaimed) {
                alert('✅ Daily reward already claimed! Come back tomorrow.');
                return;
            }
            const reward = 100;
            balance += reward;
            ceoCoins += reward;
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 200);
            dailyClaimed = true;
            updateUI();
            alert(`🎉 Daily reward claimed! +${reward} coins and +200 taps!`);
        }

        function claimCipher() {
            if (cipherClaimed) {
                alert('✅ Daily cipher already claimed! Come back tomorrow.');
                return;
            }
            const reward = 50;
            balance += reward;
            ceoCoins += reward;
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 100);
            cipherClaimed = true;
            updateUI();
            alert(`🔐 Cipher claimed! +${reward} coins and +100 taps!`);
        }

        function claimCombo() {
            if (comboClaimed) {
                alert('✅ Daily combo already claimed! Come back tomorrow.');
                return;
            }
            const reward = 75;
            balance += reward;
            ceoCoins += reward;
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 150);
            comboClaimed = true;
            updateUI();
            alert(`🔥 Combo claimed! +${reward} coins and +150 taps!`);
        }

        window.claimDaily = claimDaily;
        window.claimCipher = claimCipher;
        window.claimCombo = claimCombo;

        // --- BOOST / SUPER TAPS ---
        function handleBoost() {
            const cost = getBoostCost();
            const nextPower = tapPower + 1;
            const superCost = 300;
            
            openModal('⚡ Boost & Super Taps', `
                <p>Upgrade your tap power or buy super taps!</p>
                <div class="boost-option">
                    <div>
                        <strong style="color:#f3ba2f;">Tap Power: +${tapPower}</strong>
                        <div class="cost">Next: +${nextPower}</div>
                    </div>
                    <button onclick="upgradeBoost()">${cost.toLocaleString()} coins</button>
                </div>
                <div class="boost-option" style="border-color: #ff6b6b40;">
                    <div>
                        <strong style="color:#ff6b6b;">🔥 Super Taps</strong>
                        <div class="cost">${superTapActive ? 'ACTIVE! ×' + superTapMultiplier + ' (' + superTapRemaining + ' left)' : '×10 for 30 taps'}</div>
                    </div>
                    <button onclick="buySuperTaps()">${superCost} coins</button>
                </div>
                <div class="airdrop-info">
                    <div class="row"><span class="label">Your coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Taps remaining</span><span class="value">${Math.floor(tapsRemaining).toLocaleString()}</span></div>
                    <div class="row"><span class="label">Boost Level</span><span class="value">${boostLevel}</span></div>
                </div>
                <p style="font-size:9px;color:#8a7a54;">Tap power costs double each upgrade: 500 → 1,000 → 2,000...</p>
                <p style="font-size:9px;color:#8a7a54;">Super Taps: ×10 power for 30 taps</p>
            `);
        }

        function upgradeBoost() {
            const cost = getBoostCost();
            if (balance < cost) {
                alert(`❌ Not enough coins! You need ${cost.toLocaleString()} coins.`);
                return;
            }
            balance -= cost;
            tapPower += 1;
            boostLevel += 1;
            updateUI();
            closeModal();
            alert(`✅ Boost upgraded! Tap power is now +${tapPower}`);
            handleBoost();
        }

        function buySuperTaps() {
            const cost = 300;
            if (balance < cost) {
                alert(`❌ Not enough coins! You need ${cost} coins.`);
                return;
            }
            balance -= cost;
            superTapActive = true;
            superTapMultiplier = 10;
            superTapRemaining = 30;
            updateUI();
            closeModal();
            alert(`🔥 Super Taps activated! ×10 power for 30 taps!`);
            handleBoost();
        }

        window.upgradeBoost = upgradeBoost;
        window.buySuperTaps = buySuperTaps;

        // --- MODAL ---
        function openModal(title, contentHTML) {
            modalTitle.textContent = title;
            modalContent.innerHTML = contentHTML;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        window.closeModal = closeModal;

        // --- FRIENDS / REFERRALS ---
        function handleFriends() {
            const inviteLink = 'https://e-coin.app/invite/' + Math.random().toString(36).substring(2, 10);
            openModal('👥 Invite Friends', `
                <p>Invite your friends and earn <strong>100 coins</strong> for each invite!</p>
                <div class="referral-bonus">
                    <div class="big">👥 ${referrals}</div>
                    <div class="sub">Total Referrals</div>
                </div>
                <div class="invite-link">${inviteLink}</div>
                <button class="copy-btn" onclick="navigator.clipboard?.writeText('${inviteLink}') && alert('Link copied!')">📋 Copy Link</button>
                <button class="verify-btn" onclick="simulateReferral()">➕ Simulate Referral</button>
                <p style="margin-top:4px;font-size:9px;color:#8a7a54;">Share this link with your friends</p>
            `);
        }

        function simulateReferral() {
            referrals += 1;
            const reward = 100;
            balance += reward;
            ceoCoins += reward;
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 50);
            updateUI();
            alert(`🎉 New referral! +${reward} coins and +50 taps! Total referrals: ${referrals}`);
            handleFriends();
        }

        window.simulateReferral = simulateReferral;

        // --- MINE ---
        function handleMine() {
            const mined = Math.floor(Math.random() * 30) + 10;
            balance += mined;
            ceoCoins += Math.floor(mined / 3);
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 20);
            updateUI();
            openModal('⛏️ Mining', `
                <p>You mined <strong style="color:#f3ba2f;">+${mined}</strong> coins!</p>
                <div class="airdrop-info">
                    <div class="row"><span class="label">New Balance</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Taps Bonus</span><span class="value">+20 taps</span></div>
                </div>
                <p style="font-size:9px;color:#8a7a54;">Keep mining to earn more!</p>
                <button class="verify-btn" onclick="closeModal()">Close</button>
            `);
        }

        // --- EARN ---
        function handleEarn() {
            let tasksHTML = '';
            if (customTasks.length > 0) {
                customTasks.forEach((task, index) => {
                    tasksHTML += `
                        <div class="boost-option">
                            <div>
                                <strong style="color:#e5d6b0;">${task.question}</strong>
                                <div class="cost">Reward: ${task.reward.toLocaleString()} coins</div>
                            </div>
                            <button onclick="completeTask(${index})">Answer</button>
                        </div>
                    `;
                });
            } else {
                tasksHTML = `<p style="color:#8a7a54;font-size:10px;">No custom tasks yet. Add them in Settings!</p>`;
            }

            openModal('🎯 Earn Tasks', `
                <p>Complete tasks to earn extra coins!</p>
                <div class="airdrop-info">
                    <div class="row"><span class="label">Your Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                </div>
                ${tasksHTML}
                <p style="font-size:9px;color:#8a7a54;margin-top:6px;">Complete tasks to earn big rewards!</p>
                <button class="verify-btn" onclick="closeModal()">Close</button>
            `);
        }

        function completeTask(index) {
            const task = customTasks[index];
            if (!task) return;
            const answer = prompt(`Question: ${task.question}\n\nType your answer:`);
            if (answer && answer.toLowerCase().trim() === task.answer.toLowerCase().trim()) {
                balance += task.reward;
                ceoCoins += task.reward;
                updateUI();
                alert(`🎉 Correct! You earned ${task.reward.toLocaleString()} coins!`);
                handleEarn();
            } else if (answer !== null) {
                alert('❌ Wrong answer! Try again.');
            }
        }

        window.completeTask = completeTask;

        // --- AIRDROP ---
        function handleAirdrop() {
            const dollarValue = (balance / 1000).toFixed(2);
            openModal('🎯 Airdrop', `
                <div class="airdrop-info">
                    <div class="row"><span class="label">Your Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Value (USD)</span><span class="value">$${dollarValue}</span></div>
                    <div class="row"><span class="label">Rate</span><span class="value">1 coin = $0.001</span></div>
                    <div class="row"><span class="label">Min. Withdraw</span><span class="value">1,000 coins</span></div>
                </div>
                <p style="font-size:9px;color:#8a7a54;">Connect your Binance wallet to withdraw</p>
                <button style="background:linear-gradient(135deg,#f3ba2f,#d49c1a);border:none;padding:8px;border-radius:40px;font-weight:700;width:100%;cursor:pointer;margin-top:4px;color:#0e0c07;" onclick="connectBinance()">
                    🔗 Connect Binance Wallet
                </button>
            `);
        }

        function connectBinance() {
            alert('🔗 Binance Wallet connecting...\n\n✅ Wallet connected successfully!\n🎁 You received 50 bonus coins!');
            balance += 50;
            ceoCoins += 50;
            updateUI();
            closeModal();
        }

        window.connectBinance = connectBinance;

        // --- EXCHANGE ---
        function handleExchange() {
            openModal('📈 Exchange', `
                <p>Trade your coins for special perks!</p>
                <div class="airdrop-info">
                    <div class="row"><span class="label">Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Exchange Rate</span><span class="value">1 coin = 0.001 ETH</span></div>
                </div>
                <button style="background:linear-gradient(135deg,#f3ba2f,#d49c1a);border:none;padding:8px;border-radius:40px;font-weight:700;width:100%;cursor:pointer;margin-top:4px;color:#0e0c07;" onclick="alert('Exchange feature coming soon!')">
                    Exchange Now
                </button>
            `);
        }

        // --- SETTINGS ---
        function openSettings() {
            let linksHTML = '';
            if (customLinks.length > 0) {
                customLinks.forEach((link, index) => {
                    linksHTML += `
                        <div class="setting-item">
                            <span class="label">${link.name}</span>
                            <div>
                                <span style="color:#8a7a54;font-size:9px;">${link.url.substring(0,20)}...</span>
                                <button onclick="removeLink(${index})">✕</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                linksHTML = `<p style="color:#8a7a54;font-size:10px;text-align:center;">No custom links yet.</p>`;
            }

            let tasksHTML = '';
            if (customTasks.length > 0) {
                customTasks.forEach((task, index) => {
                    tasksHTML += `
                        <div class="setting-item">
                            <span class="label">${task.question.substring(0,20)}...</span>
                            <div>
                                <span style="color:#8a7a54;font-size:9px;">${task.reward.toLocaleString()} coins</span>
                                <button onclick="removeTask(${index})">✕</button>
                            </div>
                        </div>
                    `;
                });
            } else {
                tasksHTML = `<p style="color:#8a7a54;font-size:10px;text-align:center;">No custom tasks yet.</p>`;
            }

            openModal('⚙️ Settings', `
                <p>Customize your E-Coin experience</p>
                
                <div class="settings-group">
                    <h3 style="color:#f3ba2f;font-size:11px;margin-bottom:6px;">📎 Custom Links</h3>
                    ${linksHTML}
                    <div class="setting-item">
                        <input type="text" id="linkName" placeholder="Link name" style="width:80px;" />
                        <input type="text" id="linkUrl" placeholder="https://..." style="width:120px;" />
                        <button onclick="addLink()">Add</button>
                    </div>
                </div>
                
                <div class="settings-group">
                    <h3 style="color:#f3ba2f;font-size:11px;margin-bottom:6px;">📝 Custom Tasks</h3>
                    ${tasksHTML}
                    <div class="setting-item" style="flex-wrap:wrap;gap:4px;">
                        <input type="text" id="taskQuestion" placeholder="Question" style="width:100%;margin-bottom:4px;" />
                        <input type="text" id="taskAnswer" placeholder="Answer" style="width:45%;" />
                        <input type="number" id="taskReward" placeholder="Reward" style="width:35%;" />
                        <button onclick="addTask()" style="width:100%;margin-top:4px;">Add Task</button>
                    </div>
                </div>
                
                <div class="settings-group">
                    <h3 style="color:#f3ba2f;font-size:11px;margin-bottom:6px;">👤 Profile</h3>
                    <div class="setting-item">
                        <span class="label">Username</span>
                        <input type="text" id="usernameInput" value="${userName}" style="width:140px;" />
                        <button onclick="updateUsername()">Save</button>
                    </div>
                </div>
                
                <div class="settings-group">
                    <h3 style="color:#f3ba2f;font-size:11px;margin-bottom:6px;">🔗 Social Links</h3>
                    <div class="social-links" style="justify-content:center;">
                        <a href="https://t.me/OneWinTokenBot/start?startapp=refId8467180571" target="_blank">📱 Telegram</a>
                        <a href="https://www.tiktok.com/@esl9151" target="_blank">🎵 TikTok</a>
                        <a href="https://instagram.com/ecoin.official" target="_blank">📸 IG</a>
                        <a href="https://facebook.com/ecoin.official" target="_blank">📘 FB</a>
                    </div>
                    ${customLinks.map(link => `<a href="${link.url}" target="_blank" style="color:#f3ba2f;font-size:10px;display:inline-block;margin:2px 6px;">🔗 ${link.name}</a>`).join('')}
                </div>
                
                <div class="airdrop-info">
                    <div class="row"><span class="label">Total Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Level</span><span class="value">${getLevel(balance)}</span></div>
                    <div class="row"><span class="label">Referrals</span><span class="value">${referrals}</span></div>
                    <div class="row"><span class="label">Tap Power</span><span class="value">+${tapPower}</span></div>
                </div>
                <button class="verify-btn" onclick="closeModal()">Close</button>
            `);
        }

        function addLink() {
            const nameInput = document.getElementById('linkName');
            const urlInput = document.getElementById('linkUrl');
            if (!nameInput || !urlInput) return;
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();
            if (!name || !url) {
                alert('Please enter both name and URL.');
                return;
            }
            customLinks.push({ name, url });
            saveState();
            openSettings();
        }

        function removeLink(index) {
            customLinks.splice(index, 1);
            saveState();
            openSettings();
        }

        function addTask() {
            const questionInput = document.getElementById('taskQuestion');
            const answerInput = document.getElementById('taskAnswer');
            const rewardInput = document.getElementById('taskReward');
            if (!questionInput || !answerInput || !rewardInput) return;
            const question = questionInput.value.trim();
            const answer = answerInput.value.trim();
            const reward = parseInt(rewardInput.value);
            if (!question || !answer || !reward) {
                alert('Please fill all fields.');
                return;
            }
            customTasks.push({ question, answer, reward });
            saveState();
            openSettings();
        }

        function removeTask(index) {
            customTasks.splice(index, 1);
            saveState();
            openSettings();
        }

        function updateUsername() {
            const input = document.getElementById('usernameInput');
            if (!input) return;
            const name = input.value.trim();
            if (!name) {
                alert('Please enter a username.');
                return;
            }
            userName = name;
            userNameDisplay.textContent = userName + ' (CEO)';
            saveState();
            openSettings();
            updateUI();
        }

        window.openSettings = openSettings;
        window.addLink = addLink;
        window.removeLink = removeLink;
        window.addTask = addTask;
        window.removeTask = removeTask;
        window.updateUsername = updateUsername;

        // --- EVENTS ---
        boostBtn.addEventListener('click', handleBoost);
        friendsBtn.addEventListener('click', handleFriends);
        airdropBtn.addEventListener('click', handleAirdrop);
        exchangeBtn.addEventListener('click', handleExchange);
        mineBtn.addEventListener('click', handleMine);
        earnBtn.addEventListener('click', handleEarn);

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // --- NAV ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // --- CEO DOUBLE CLICK ---
        ceoTag.addEventListener('dblclick', function() {
            ceoCoins += 500;
            balance += 100;
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 100);
            updateUI();
            this.style.color = '#f3ba2f';
            setTimeout(() => this.style.color = '', 300);
        });

        // --- USER CLICK FOR PROFILE ---
        userInfo.addEventListener('click', function() {
            const tgLink = 'https://t.me/OneWinTokenBot/start?startapp=refId8467180571';
            let customLinksHTML = customLinks.map(link => `<a href="${link.url}" target="_blank" style="color:#f3ba2f;font-size:10px;display:inline-block;margin:2px 6px;">🔗 ${link.name}</a>`).join('');
            openModal('👤 Profile', `
                <div class="user-profile">
                    <div class="avatar-lg">${avatarDisplay.innerHTML || '👩'}</div>
                    <div class="info">
                        <div class="name">${userName} <span class="admin-badge">ADMIN</span></div>
                        <div class="handle">@${userName.toLowerCase().replace(' ', '_')}</div>
                    </div>
                </div>
                <div class="airdrop-info">
                    <div class="row"><span class="label">Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Level</span><span class="value">${getLevel(balance)}</span></div>
                    <div class="row"><span class="label">Referrals</span><span class="value">${referrals}</span></div>
                    <div class="row"><span class="label">Tap Power</span><span class="value">+${tapPower}</span></div>
                    <div class="row"><span class="label">Taps Left</span><span class="value">${Math.floor(tapsRemaining).toLocaleString()}</span></div>
                    <div class="row"><span class="label">Super Taps</span><span class="value">${superTapActive ? '✅ ACTIVE ×' + superTapMultiplier : '❌ Inactive'}</span></div>
                </div>
                <div class="social-links">
                    <a href="${tgLink}" target="_blank">📱 Telegram</a>
                    <a href="https://www.tiktok.com/@esl9151" target="_blank">🎵 TikTok</a>
                    <a href="https://instagram.com/ecoin.official" target="_blank">📸 IG</a>
                    <a href="https://facebook.com/ecoin.official" target="_blank">📘 FB</a>
                </div>
                ${customLinksHTML}
                <p style="font-size:9px;color:#8a7a54;">Follow us on social media for updates and bonuses!</p>
                <button class="verify-btn" onclick="closeModal()">Close</button>
            `);
        });

        // --- INIT ---
        const today = new Date().toDateString();
        const lastDate = localStorage.getItem('eco_last_date');
        if (!lastDate || lastDate !== today) {
            dailyClaimed = false;
            cipherClaimed = false;
            comboClaimed = false;
            tapsRemaining = MAX_TAPS;
            localStorage.setItem('eco_last_date', today);
            saveState();
        }

        updateTimers();
        updateUI();
        setInterval(updateTimers, 1000);

        setInterval(() => {
            if (progress < maxProgress) {
                progress = Math.min(maxProgress, progress + 2);
                updateUI();
            }
        }, 2000);

        console.log('💰 E-Coin loaded!');
        console.log('⚡ Tap power:', tapPower);
        console.log('🔋 Taps remaining:', tapsRemaining);
        console.log('👥 Referrals:', referrals);
        console.log('📝 Custom tasks:', customTasks.length);
        console.log('🔗 Custom links:', customLinks.length);
    })();
</script>
</body>
</html>
