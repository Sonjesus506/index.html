<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Bleach - Tap to Earn</title>
    <!-- HII NDIO LINK SAHIHI SASA HIVI: Ina WebApp yenye herufi kubwa -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #0b0e11;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        .app-container {
            width: 100%;
            max-width: 430px;
            height: 100vh;
            background: linear-gradient(180deg, #141a20 0%, #0b0e11 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .profile-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background-color: #f3ba2f;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: #000;
            font-size: 16px;
            text-transform: uppercase;
        }
        .user-info p {
            font-size: 14px;
            font-weight: bold;
        }
        .rank-badge {
            font-size: 11px;
            color: #f3ba2f;
            background: rgba(243, 186, 47, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 2px;
            display: inline-block;
        }

        /* Balance */
        .balance-section {
            text-align: center;
            margin: 15px 0;
        }
        .coin-balance {
            font-size: 42px;
            font-weight: 800;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .mini-gold-coin {
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #ffe066 0%, #f3ba2f 70%, #947116 100%);
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 8px #f3ba2f;
        }

        /* Click Area */
        .click-area {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }
        .main-coin {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #ffe680 0%, #f3ba2f 50%, #c4951a 85%, #73560c 100%);
            border-radius: 50%;
            border: 8px solid #f5c443;
            box-shadow: 0 15px 25px rgba(0,0,0,0.5), inset 0 4px 6px rgba(255,255,255,0.6), 0 0 30px rgba(243, 186, 47, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.05s ease;
        }
        .coin-logo {
            font-size: 100px;
            font-weight: 900;
            color: #3b2d04;
        }
        .main-coin:active {
            transform: scale(0.94);
        }

        /* Tasks Section */
        .tasks-section {
            background: rgba(30, 38, 48, 0.6);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #2d3846;
            margin-bottom: 15px;
        }
        .tasks-title {
            font-size: 13px;
            color: #848e9c;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .task-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e2630;
            padding: 10px 15px;
            border-radius: 12px;
            text-decoration: none;
            color: #ffffff;
            border: 1px solid #3a4756;
        }
        .task-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .task-icon {
            font-size: 20px;
        }
        .task-name {
            font-size: 13px;
            font-weight: bold;
        }
        .task-reward {
            font-size: 11px;
            color: #f3ba2f;
            margin-top: 2px;
        }
        .task-btn {
            background: #f3ba2f;
            color: #000;
            border: none;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Bottom Section */
        .bottom-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 38, 48, 0.5);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid #2d3846;
        }
        .energy-info {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 15px;
            font-weight: bold;
        }
        .energy-icon {
            color: #f3ba2f;
        }
        .boost-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f3ba2f;
            border: none;
            color: #000;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="profile-section">
                <div id="user-avatar" class="avatar">U</div>
                <div class="user-info">
                    <p id="user-name">Mchezaji (CEO)</p>
                    <span id="multitap-level" class="rank-badge">Tap: +1</span>
                </div>
            </div>
        </div>

        <!-- Balance -->
        <div class="balance-section">
            <div class="coin-balance">
                <div class="mini-gold-coin"></div>
                <span id="score">0</span>
            </div>
        </div>

        <!-- Coin Clicker -->
        <div class="click-area">
            <div id="tap-coin" class="main-coin">
                <div class="coin-logo">E</div>
            </div>
        </div>

        <!-- Daily Tasks -->
        <div class="tasks-section">
            <p class="tasks-title">Daily Tasks / Kazi za Leo</p>
            <div class="task-card">
                <div class="task-left">
                    <span class="task-icon">📢</span>
                    <div>
                        <p class="task-name">Jiunge kwenye Telegram yetu</p>
                        <p class="task-reward">+2,000 E-COIN</p>
                    </div>
                </div>
                <button class="task-btn" id="task-btn-action">Open</button>
            </div>
        </div>

        <!-- Bottom Energy and Boost -->
        <div class="bottom-section">
            <div class="energy-info">
                <span class="energy-icon">⚡</span>
                <p><span id="energy-current">1000</span> / 1000</p>
            </div>
            <button id="boost-btn-action" class="boost-btn">
                <span>🚀</span> Boost (+2)
            </button>
        </div>
    </div>

    <script>
        // Telegram Setup
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Kuchukua data za mtumiaji
        const userNameDisplay = document.getElementById('user-name');
        const userAvatarDisplay = document.getElementById('user-avatar');
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            userNameDisplay.textContent = `${user.first_name} (CEO)`;
            userAvatarDisplay.textContent = user.first_name.charAt(0);
        }

        // Vipengele vya Mchezo
        const coin = document.getElementById('tap-coin');
        const scoreDisplay = document.getElementById('score');
        const energyDisplay = document.getElementById('energy-current');
        const boostBtn = document.getElementById('boost-btn-action');
        const taskBtn = document.getElementById('task-btn-action');
        const multitapLevelDisplay = document.getElementById('multitap-level');

        // Kupakia Progress
        let currentScore = parseInt(localStorage.getItem('homebleach_score')) || 0;
        let currentEnergy = parseInt(localStorage.getItem('homebleach_energy')) || 1000;
        let tapValue = parseInt(localStorage.getItem('homebleach_tapvalue')) || 1;

        scoreDisplay.textContent = currentScore.toLocaleString();
        energyDisplay.textContent = currentEnergy;
        multitapLevelDisplay.textContent = `Tap: +${tapValue}`;
        
        if(tapValue > 1) {
            boostBtn.style.background = "#4e5d6c";
            boostBtn.style.color = "#fff";
            boostBtn.innerHTML = "🚀 Max Boosted";
        }

        // Kubofya Coin
        coin.addEventListener('click', () => {
            if (currentEnergy >= tapValue) {
                currentScore += tapValue;
                currentEnergy -= tapValue;
                
                scoreDisplay.textContent = currentScore.toLocaleString();
                energyDisplay.textContent = currentEnergy;

                localStorage.setItem('homebleach_score', currentScore);
                localStorage.setItem('homebleach_energy', currentEnergy);
            }
        });

        // Boost
        boostBtn.addEventListener('click', () => {
            if (tapValue === 1) {
                if (currentScore >= 100) {
                    currentScore -= 100;
                    tapValue = 2;
                    
                    localStorage.setItem('homebleach_score', currentScore);
                    localStorage.setItem('homebleach_tapvalue', tapValue);

                    scoreDisplay.textContent = currentScore.toLocaleString();
                    multitapLevelDisplay.textContent = `Tap: +${tapValue}`;
                    boostBtn.style.background = "#4e5d6c";
                    boostBtn.style.color = "#fff";
                    boostBtn.innerHTML = "🚀 Max Boosted";
                    alert("Hongera! Sasa unabofya na kupata pointi +2!");
                } else {
                    alert("Unahitaji angalau E-COIN 100 ili kuwasha Boost ya Tap +2!");
                }
            }
        });

        // Task
        taskBtn.addEventListener('click', () => {
            window.open('https://t.me/EsboniBot', '_blank');
            currentScore += 2000;
            localStorage.setItem('homebleach_score', currentScore);
            scoreDisplay.textContent = currentScore.toLocaleString();
        });

        // Energy Regen
        setInterval(() => {
            if (currentEnergy < 1000) {
                currentEnergy += 1;
                energyDisplay.textContent = currentEnergy;
                localStorage.setItem('homebleach_energy', currentEnergy);
            }
        }, 1500);
    </script>
</body>
</html>
