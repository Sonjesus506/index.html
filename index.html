<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>E-Coin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            color: #f0e6d0;
            position: fixed;
        }
        .app {
            width: 100%;
            height: 100%;
            background: #12100d;
            display: flex;
            flex-direction: column;
            padding: 8px 10px 6px;
            overflow: hidden;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1a1610;
            padding: 2px 10px 2px 4px;
            border-radius: 40px;
            border: 1px solid #3d321f;
            cursor: pointer;
        }
        .avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0e0c07;
            font-size: 12px;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-info span {
            font-weight: 500;
            font-size: 11px;
            color: #e5d6b0;
        }
        .badge {
            background: #2f2a1a;
            color: #f3ba2f;
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 9px;
            font-weight: 600;
            border: 1px solid #4f3d1f;
        }
        .balance-card {
            background: #1a1610;
            border-radius: 16px;
            padding: 8px 10px 6px;
            text-align: center;
            border: 1px solid #2f281c;
            margin-bottom: 4px;
            flex-shrink: 0;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.6);
        }
        .balance-card .label {
            font-size: 8px;
            color: #b0945a;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .balance-card .amount {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fad974;
            line-height: 1.1;
            text-shadow: 0 0 30px #f3ba2f20;
            letter-spacing: 1px;
        }
        .balance-card .stats {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 2px;
            font-size: 10px;
            color: #bdaa7a;
        }
        .balance-card .stats span {
            background: #0e0c07;
            padding: 1px 10px;
            border-radius: 40px;
            border: 1px solid #2f281c;
        }
        .level-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1610;
            border-radius: 30px;
            padding: 2px 10px 2px 12px;
            border: 1px solid #2f281c;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .level-row .level-badge {
            font-size: 11px;
            font-weight: 600;
            color: #f3ba2f;
        }
        .level-row .level-badge span {
            color: #e5d6b0;
            font-weight: 400;
        }
        .level-row .next-level {
            font-size: 9px;
            color: #8a7a54;
        }
        .timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 3px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .timer-item {
            background: #19150f;
            border-radius: 10px;
            padding: 4px 2px;
            text-align: center;
            border: 1px solid #2d2417;
            cursor: pointer;
            transition: background 0.2s;
        }
        .timer-item:active {
            background: #2a2215;
        }
        .timer-item .value {
            font-size: 0.8rem;
            font-weight: 700;
            color: #f3ba2f;
        }
        .timer-item .desc {
            font-size: 6px;
            text-transform: uppercase;
            color: #8a7a54;
            letter-spacing: 0.3px;
            margin-top: 1px;
        }
        .progress-row {
            background: #1a1610;
            border-radius: 40px;
            padding: 3px 12px 3px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2f281c;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .progress-row .left {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            flex: 1;
        }
        .progress-row .left .fill {
            flex: 1;
            height: 3px;
            background: #2a2215;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-row .left .fill .bar {
            height: 100%;
            background: linear-gradient(90deg, #f3ba2f, #d49c1a);
            border-radius: 10px;
            transition: width 0.2s;
        }
        .progress-row .right {
            background: #f3ba2f;
            color: #0e0c07;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 10px;
            cursor: pointer;
            transition: 0.08s;
            box-shadow: 0 3px 0 #876a1a;
            border: none;
            flex-shrink: 0;
        }
        .progress-row .right:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #876a1a;
        }
        .coin-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
            position: relative;
            margin: 2px 0;
            overflow: visible;
            touch-action: none;
        }
        .coin {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 35% 30%, #fce181, #d49c1a 50%, #b8860b 75%, #8a6b0e);
            border-radius: 50%;
            border: 8px solid #f9d342;
            box-shadow: 0 0 0 3px #6b4f0e, 0 12px 40px rgba(243, 186, 47, 0.4), inset 0 -10px 30px rgba(0,0,0,0.5), inset 0 10px 30px rgba(255,215,0,0.2);
            cursor: pointer;
            transition: transform 0.06s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            touch-action: none;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .coin::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.15);
            pointer-events: none;
        }
        .coin::after {
            content: 'E';
            position: relative;
            z-index: 1;
            font-size: 5.5rem;
            font-weight: 900;
            color: #7a5f0e;
            text-shadow: 0 2px 4px rgba(255,215,0,0.2), 0 -2px 4px rgba(0,0,0,0.3);
            font-family: 'Georgia', serif;
        }
        .coin:active {
            transform: scale(0.88);
        }
        .coin.disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        .float-text {
            position: absolute;
            font-size: 2rem;
            font-weight: 800;
            color: #f3ba2f;
            text-shadow: 0 0 20px #f3ba2f, 0 0 40px #f3ba2f80, 0 0 60px #f3ba2f40;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 0.9s ease-out forwards;
            font-family: 'Segoe UI', sans-serif;
        }
        .float-text.super {
            color: #ff6b6b;
            text-shadow: 0 0 20px #ff6b6b, 0 0 40px #ff6b6b80, 0 0 60px #ff6b6b40;
            font-size: 2.8rem;
        }
        .float-text.tap-limit {
            color: #ffd93d;
            text-shadow: 0 0 20px #ffd93d, 0 0 40px #ffd93d80;
            font-size: 1.8rem;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            30% { opacity: 1; transform: translateY(-20px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-130px) scale(1.3); }
        }
        .coin-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .ceo-tag {
            background: #1f1a0f;
            padding: 2px 12px 2px 8px;
            border-radius: 40px;
            font-size: 10px;
            border: 1px solid #3d321f;
            color: #d4bb7a;
            cursor: pointer;
        }
        .ceo-tag span {
            color: #f3ba2f;
            font-weight: 600;
        }
        .small-balance {
            font-size: 11px;
            color: #8a7a54;
        }
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 3px;
            margin-bottom: 4px;
            flex-shrink: 0;
        }
        .action-btn {
            background: #1a1610;
            border: 1px solid #2f281c;
            border-radius: 30px;
            padding: 5px 0;
            text-align: center;
            font-weight: 600;
            font-size: 9px;
            color: #e5d6b0;
            cursor: pointer;
            transition: 0.08s;
            box-shadow: 0 3px 0 #0a0806;
            border: none;
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a0806;
        }
        .action-btn.gold {
            background: #f3ba2f;
            border-color: #f3ba2f;
            color: #0b0a08;
            box-shadow: 0 3px 0 #876a1a;
        }
        .action-btn.gold:active {
            background: #dbaa24;
        }
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #14110d;
            border-radius: 40px;
            padding: 2px 4px;
            border: 1px solid #2f281c;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3px 4px;
            border-radius: 30px;
            font-size: 8px;
            color: #7a6a4a;
            cursor: pointer;
            background: transparent;
            border: none;
            font-weight: 500;
            gap: 0px;
            transition: 0.1s;
            flex: 1;
        }
        .nav-item .icon {
            font-size: 14px;
            line-height: 1;
        }
        .nav-item.active {
            color: #f3ba2f;
            background: #1e1a12;
        }
        .nav-item:active {
            opacity: 0.6;
        }
        .footer-airdrop {
            text-align: center;
            font-size: 8px;
            color: #4d3f28;
            letter-spacing: 1px;
            border-top: 1px solid #1f1a10;
            padding-top: 3px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .footer-airdrop span {
            background: #1a1610;
            padding: 1px 14px;
            border-radius: 40px;
            border: 1px solid #2f281c;
            color: #f3ba2f;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(6px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #1a1610;
            border: 1px solid #3d321f;
            border-radius: 30px;
            padding: 20px 16px 16px;
            max-width: 340px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h2 {
            color: #f3ba2f;
            font-size: 1.2rem;
            margin-bottom: 12px;
            text-align: center;
        }
        .modal-box p {
            color: #bdaa7a;
            font-size: 12px;
            margin-bottom: 8px;
            text-align: center;
        }
        .modal-box .close-btn {
            background: #f3ba2f;
            border: none;
            padding: 8px;
            border-radius: 40px;
            font-weight: 700;
            color: #0e0c07;
            width: 100%;
            font-size: 14px;
            cursor: pointer;
            margin-top: 6px;
        }
        .modal-box .invite-link {
            background: #0e0c07;
            padding: 8px;
            border-radius: 14px;
            border: 1px solid #2f281c;
            color: #f3ba2f;
            font-size: 12px;
            word-break: break-all;
            margin: 8px 0;
            text-align: center;
        }
        .modal-box .copy-btn {
            background: #2f281c;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            color: #f3ba2f;
            font-weight: 600;
            cursor: pointer;
            margin: 3px auto;
            display: block;
        }
        .modal-box .airdrop-info {
            background: #0e0c07;
            padding: 12px;
            border-radius: 14px;
            border: 1px solid #2f281c;
            margin: 6px 0;
        }
        .modal-box .airdrop-info .row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            font-size: 12px;
        }
        .modal-box .airdrop-info .row .label {
            color: #8a7a54;
        }
        .modal-box .airdrop-info .row .value {
            color: #f3ba2f;
            font-weight: 600;
        }
        .modal-box .boost-option {
            background: #0e0c07;
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid #2f281c;
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-box .boost-option button {
            background: #f3ba2f;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer; 
            font-size: 11px;
        }
        .modal-box .boost-option .cost {
            color: #8a7a54;
            font-size: 10px;
        }
        .modal-box .referral-bonus {
            background: linear-gradient(135deg, #2f281c, #1a1610);
            border: 1px solid #f3ba2f40;
            border-radius: 14px;
            padding: 10px;
            margin: 6px 0;
            text-align: center;
        }
        .modal-box .referral-bonus .big {
            font-size: 1.6rem;
            color: #f3ba2f;
            font-weight: 700;
        }
        .modal-box .referral-bonus .sub {
            font-size: 10px;
            color: #8a7a54;
        }
        .modal-box .social-links {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .modal-box .social-links a {
            color: #f3ba2f;
            text-decoration: none;
            font-size: 18px;
            background: #0e0c07;
            padding: 5px 10px;
            border-radius: 30px;
            border: 1px solid #2f281c;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
        }
        .modal-box .social-links a:hover {
            background: #2f281c;
        }
        .modal-box .social-links a .icon {
            font-size: 16px;
        }
        .modal-box .admin-badge {
            background: #f3ba2f;
            color: #0e0c07;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 700;
            display: inline-block;
            margin: 4px auto;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
        }
        .user-profile .avatar-lg {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .user-profile .avatar-lg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .user-profile .info {
            flex: 1;
        }
        .user-profile .info .name {
            color: #f3ba2f;
            font-weight: 600;
            font-size: 14px;
        }
        .user-profile .info .handle {
            color: #8a7a54;
            font-size: 11px;
        }
        .tap-limit-bar {
            background: #0e0c07;
            border-radius: 30px;
            padding: 2px 10px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2f281c;
            flex-shrink: 0;
        }
        .tap-limit-bar .label {
            font-size: 8px;
            color: #8a7a54;
        }
        .tap-limit-bar .value {
            font-size: 10px;
            font-weight: 700;
            color: #f3ba2f;
        }
        .tap-limit-bar .fill {
            width: 80px;
            height: 4px;
            background: #2a2215;
            border-radius: 10px;
            overflow: hidden;
        }
        .tap-limit-bar .fill .bar {
            height: 100%;
            background: linear-gradient(90deg, #f3ba2f, #ff6b6b);
            border-radius: 10px;
            transition: width 0.5s;
        }
        @media (max-width: 420px) {
            .coin { width: 170px; height: 170px; }
            .coin::after { font-size: 4.5rem; }
            .balance-card .amount { font-size: 2rem; }
        }
        @media (max-width: 360px) {
            .coin { width: 150px; height: 150px; }
            .coin::after { font-size: 4rem; }
            .balance-card .amount { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="app" id="app">

    <div class="header">
        <div class="user-info" id="userInfo">
            <div class="avatar" id="avatarDisplay">👩</div>
            <span id="userNameDisplay">Jane </span>
        </div>
        <div class="badge">Silver ▾</div>
    </div>

    <div class="balance-card">
        <div class="label">💰 BALANCE</div>
        <div class="amount" id="balanceDisplay">0</div>
        <div class="stats">
    
            <span>⚡ +207 /h</span>
        </div>
    </div>

    <div class="level-row">
        <div class="level-badge">🏆 Level <span id="levelDisplay">1</span></div>
        <div class="next-level" id="nextLevelDisplay">Next: 1,000 coins</div>
    </div>

    <div class="timer-grid">
        <div class="timer-item" onclick="claimDaily()">
            <div class="value" id="dailyTimer">05:35</div>
            <div class="desc">Daily reward</div>
        </div>
        <div class="timer-item" onclick="claimCipher()">
            <div class="value" id="cipherTimer">00:56</div>
            <div class="desc">Daily cipher</div>
        </div>
        <div class="timer-item" onclick="claimCombo()">
            <div class="value" id="comboTimer">02:04</div>
            <div class="desc">Daily combo</div>
        </div>
    </div>

    <!-- Tap Limit Bar -->
    <div class="tap-limit-bar">
        <span class="label">🔋 Taps Left</span>
        <div class="fill"><div class="bar" id="tapLimitBar" style="width:100%"></div></div>
        <span class="value" id="tapLimitDisplay">1,500</span>
    </div>

    <div class="progress-row">
        <div class="left">
            <span>$</span>
            <div class="fill"><div class="bar" id="progressBar" style="width:0%"></div></div>
        </div>
        <button class="right" id="boostBtn">Boost</button>
    </div>

    <div class="coin-wrapper" id="coinWrapper">
        <div class="coin" id="mainCoin" role="button" aria-label="Tap to earn"></div>
    </div>

    <div class="coin-label">
        <div class="ceo-tag" id="ceoTag">👑  <span id="ceoCoinCount">0</span></div>
        <div class="small-balance">🪙 <span id="balanceSmall">0</span></div>
    </div>

    <div class="action-grid">
        <button class="action-btn gold" id="exchangeBtn">Exchange</button>
        <button class="action-btn" id="friendsBtn">👥 Friends</button>
        <button class="action-btn" id="airdropBtn">Airdrop</button>
        <button class="action-btn" id="aiBtn">🤖 AI</button>
    </div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
        <h2 id="modalTitle">Modal</h2>
        <div id="modalContent"></div>
        <button class="close-btn" id="modalClose">Close</button>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // DOM
        const balanceDisplay = document.getElementById('balanceDisplay');
        const balanceSmall = document.getElementById('balanceSmall');
        const ceoCoinCount = document.getElementById('ceoCoinCount');
        const coinEl = document.getElementById('mainCoin');
        const coinWrapper = document.getElementById('coinWrapper');
        const dailyTimer = document.getElementById('dailyTimer');
        const cipherTimer = document.getElementById('cipherTimer');
        const comboTimer = document.getElementById('comboTimer');
        const progressBar = document.getElementById('progressBar');
        const boostBtn = document.getElementById('boostBtn');
        const levelDisplay = document.getElementById('levelDisplay');
        const nextLevelDisplay = document.getElementById('nextLevelDisplay');
        const ceoTag = document.getElementById('ceoTag');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const avatarDisplay = document.getElementById('avatarDisplay');
        const userInfo = document.getElementById('userInfo');
        const tapLimitBar = document.getElementById('tapLimitBar');
        const tapLimitDisplay = document.getElementById('tapLimitDisplay');

        const exchangeBtn = document.getElementById('exchangeBtn');
        const friendsBtn = document.getElementById('friendsBtn');
        const airdropBtn = document.getElementById('airdropBtn');
        const aiBtn = document.getElementById('aiBtn');

        const modalOverlay = document.getElementById('modalOverlay');
        const modalBox = document.getElementById('modalBox');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');

        // --- PERSISTENT STORAGE ---
        const STORAGE_KEY = 'eco_app_data_v9';

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    return data;
                }
            } catch (e) {}
            return null;
        }

        function saveData(data) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {}
        }

        // --- STATE ---
        const MAX_TAPS = 1500;
        let saved = loadData();
        let balance = saved?.balance || 0;
        let ceoCoins = saved?.ceoCoins || 0;
        let progress = saved?.progress || 0;
        let tapPower = saved?.tapPower || 1;
        let boostLevel = saved?.boostLevel || 1;
        let dailyClaimed = saved?.dailyClaimed || false;
        let cipherClaimed = saved?.cipherClaimed || false;
        let comboClaimed = saved?.comboClaimed || false;
        let referrals = saved?.referrals || 0;
        let userName = saved?.userName || 'Jane';
        let tapsRemaining = saved?.tapsRemaining !== undefined ? saved.tapsRemaining : MAX_TAPS;
        let lastTapTime = saved?.lastTapTime || 0;
        let superTapActive = saved?.superTapActive || false;
        let superTapMultiplier = saved?.superTapMultiplier || 1;
        const maxProgress = 1500;

        // --- FUNCTIONS ---
        function getLevel(coins) {
            if (coins < 1000) return 1;
            return Math.floor(coins / 1000) + 1;
        }

        function getNextLevelThreshold(coins) {
            const current = getLevel(coins);
            return current * 1000;
        }

        function getBoostCost() {
            return 500 * Math.pow(2, boostLevel - 1);
        }

        function getTapRegenRate() {
            // Regenerate 1 tap every 0.4 seconds (1500 taps in 10 minutes)
            return 0.4;
        }

        function saveState() {
            saveData({
                balance: balance,
                ceoCoins: ceoCoins,
                progress: progress,
                tapPower: tapPower,
                boostLevel: boostLevel,
                dailyClaimed: dailyClaimed,
                cipherClaimed: cipherClaimed,
                comboClaimed: comboClaimed,
                referrals: referrals,
                userName: userName,
                tapsRemaining: tapsRemaining,
                lastTapTime: lastTapTime,
                superTapActive: superTapActive,
                superTapMultiplier: superTapMultiplier
            });
        }

        function updateUI() {
            const formatted = balance.toLocaleString();
            balanceDisplay.textContent = formatted;
            balanceSmall.textContent = formatted;
            ceoCoinCount.textContent = ceoCoins.toLocaleString();

            const pct = Math.min(100, (progress / maxProgress) * 100);
            progressBar.style.width = pct + '%';

            const newLevel = getLevel(balance);
            levelDisplay.textContent = newLevel;
            const nextThreshold = getNextLevelThreshold(balance);
            nextLevelDisplay.textContent = `Next: ${nextThreshold.toLocaleString()} coins`;

            // Update tap limit
            const tapPct = Math.min(100, (tapsRemaining / MAX_TAPS) * 100);
            tapLimitBar.style.width = tapPct + '%';
            tapLimitDisplay.textContent = Math.floor(tapsRemaining).toLocaleString();

            // Enable/disable coin
            if (tapsRemaining <= 0) {
                coinEl.classList.add('disabled');
            } else {
                coinEl.classList.remove('disabled');
            }

            saveState();
        }

        // --- TAP REGENERATION ---
        function regenerateTaps() {
            const now = Date.now();
            const timeSinceLastTap = (now - lastTapTime) / 1000; // seconds
            const regenRate = getTapRegenRate();
            const tapsToAdd = Math.floor(timeSinceLastTap / regenRate);
            
            if (tapsToAdd > 0 && tapsRemaining < MAX_TAPS) {
                tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + tapsToAdd);
                lastTapTime = now - (timeSinceLastTap % regenRate * 1000);
                updateUI();
            }
        }

        // --- MULTI-TOUCH SUPPORT ---
        function handleTap(e) {
            e.preventDefault?.();
            
            // Regenerate taps first
            regenerateTaps();
            
            if (tapsRemaining <= 0) {
                showTapLimitMessage();
                return;
            }

            let amount = tapPower;
            let isSuper = false;
            
            // Check if super tap is active
            if (superTapActive) {
                amount = tapPower * superTapMultiplier;
                isSuper = true;
                // Super tap uses more taps
                const tapCost = Math.ceil(superTapMultiplier / 2);
                if (tapsRemaining < tapCost) {
                    showTapLimitMessage();
                    return;
                }
                tapsRemaining -= tapCost;
            } else {
                tapsRemaining -= 1;
            }

            balance += amount;
            ceoCoins += amount;
            if (progress < maxProgress) {
                progress = Math.min(maxProgress, progress + amount);
            }
            
            lastTapTime = Date.now();
            updateUI();

            // Show floating text
            const rect = coinEl.getBoundingClientRect();
            const wrapperRect = coinWrapper.getBoundingClientRect();
            const cx = rect.left - wrapperRect.left + rect.width / 2;
            const cy = rect.top - wrapperRect.top + 10;

            if (e.touches) {
                for (let i = 0; i < Math.min(e.touches.length, 3); i++) {
                    const touch = e.touches[i];
                    const tx = touch.clientX - wrapperRect.left;
                    const ty = touch.clientY - wrapperRect.top;
                    createFloatText(tx, ty, amount, isSuper);
                }
            } else {
                createFloatText(cx, cy, amount, isSuper);
            }

            coinEl.style.transform = 'scale(0.86)';
            setTimeout(() => coinEl.style.transform = '', 80);
        }

        function showTapLimitMessage() {
            // Show "Wait" message
            const wrapperRect = coinWrapper.getBoundingClientRect();
            const cx = wrapperRect.width / 2;
            const cy = 20;
            const el = document.createElement('div');
            el.className = 'float-text tap-limit';
            el.textContent = '⏳ Wait...';
            el.style.left = (cx - 30) + 'px';
            el.style.top = (cy) + 'px';
            coinWrapper.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function createFloatText(x, y, amount, isSuper) {
            const el = document.createElement('div');
            el.className = 'float-text' + (isSuper ? ' super' : '');
            el.textContent = isSuper ? `×${amount}` : `+${amount}`;
            el.style.left = (x - 20) + 'px';
            el.style.top = (y - 10) + 'px';
            const offsetX = (Math.random() - 0.5) * 30;
            el.style.transform = `translateX(${offsetX}px)`;
            coinWrapper.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        // --- COIN EVENTS ---
        coinEl.addEventListener('click', (e) => handleTap(e));
        coinEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap(e);
        }, { passive: false });
        coinEl.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        // --- TAP REGENERATION INTERVAL ---
        setInterval(() => {
            regenerateTaps();
        }, 1000);

        // --- TIMERS ---
        function updateTimers() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            let diff = Math.max(0, (midnight - now) / 1000);
            const dh = Math.floor(diff / 3600);
            const dm = Math.floor((diff % 3600) / 60);
            dailyTimer.textContent = `${String(dh).padStart(2,'0')}:${String(dm).padStart(2,'0')}`;

            const secs = now.getSeconds();
            const fakeCipher = 60 - (secs % 60);
            cipherTimer.textContent = `00:${String(fakeCipher).padStart(2,'0')}`;

            const comboMin = Math.floor((secs % 30) / 2);
            const comboSec = secs % 30;
            comboTimer.textContent = `${String(comboMin).padStart(2,'0')}:${String(comboSec).padStart(2,'0')}`;

            const today = now.toDateString();
            const lastDate = localStorage.getItem('eco_last_date');
            if (lastDate !== today) {
                dailyClaimed = false;
                cipherClaimed = false;
                comboClaimed = false;
                localStorage.setItem('eco_last_date', today);
                // Reset taps daily
                tapsRemaining = MAX_TAPS;
                saveState();
                updateUI();
            }
        }

        // --- DAILY TASK CLAIMS ---
        function claimDaily() {
            if (dailyClaimed) {
                alert('✅ Daily reward already claimed! Come back tomorrow.');
                return;
            }
            const reward = 100;
            balance += reward;
            ceoCoins += reward;
            // Add bonus taps
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 200);
            dailyClaimed = true;
            updateUI();
            alert(`🎉 Daily reward claimed! +${reward} coins and +200 taps!`);
        }

        function claimCipher() {
            if (cipherClaimed) {
                alert('✅ Daily cipher already claimed! Come back tomorrow.');
                return;
            }
            const reward = 50;
            balance += reward;
            ceoCoins += reward;
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 100);
            cipherClaimed = true;
            updateUI();
            alert(`🔐 Cipher claimed! +${reward} coins and +100 taps!`);
        }

        function claimCombo() {
            if (comboClaimed) {
                alert('✅ Daily combo already claimed! Come back tomorrow.');
                return;
            }
            const reward = 75;
            balance += reward;
            ceoCoins += reward;
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 150);
            comboClaimed = true;
            updateUI();
            alert(`🔥 Combo claimed! +${reward} coins and +150 taps!`);
        }

        window.claimDaily = claimDaily;
        window.claimCipher = claimCipher;
        window.claimCombo = claimCombo;

        // --- BOOST / SUPER TAPS ---
        function handleBoost() {
            const cost = getBoostCost();
            const nextPower = tapPower + 1;
            const superCost = 300;
            const superMult = 10;
            
            openModal('⚡ Boost & Super Taps', `
                <p>Upgrade your tap power or buy super taps!</p>
                
                <div class="boost-option">
                    <div>
                        <strong style="color:#f3ba2f;">Tap Power: +${tapPower}</strong>
                        <div class="cost">Next: +${nextPower}</div>
                    </div>
                    <button onclick="upgradeBoost()">${cost.toLocaleString()} coins</button>
                </div>
                
                <div class="boost-option" style="border-color: #ff6b6b40;">
                    <div>
                        <strong style="color:#ff6b6b;">🔥 Super Taps</strong>
                        <div class="cost">${superTapActive ? 'ACTIVE! ×' + superTapMultiplier : '×10 for 30 taps'}</div>
                    </div>
                    <button onclick="buySuperTaps()">${superCost} coins</button>
                </div>
                
                <div class="airdrop-info">
                    <div class="row"><span class="label">Your coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Taps remaining</span><span class="value">${Math.floor(tapsRemaining).toLocaleString()}</span></div>
                    <div class="row"><span class="label">Boost Level</span><span class="value">${boostLevel}</span></div>
                </div>
                <p style="font-size:10px;color:#8a7a54;">Tap power costs double each upgrade: 500 → 1,000 → 2,000...</p>
                <p style="font-size:10px;color:#8a7a54;">Super Taps: ×10 power for 30 taps (uses 15 taps)</p>
            `);
        }

        function upgradeBoost() {
            const cost = getBoostCost();
            if (balance < cost) {
                alert(`❌ Not enough coins! You need ${cost.toLocaleString()} coins.`);
                return;
            }
            balance -= cost;
            tapPower += 1;
            boostLevel += 1;
            updateUI();
            closeModal();
            alert(`✅ Boost upgraded! Tap power is now +${tapPower}`);
            handleBoost();
        }

        function buySuperTaps() {
            const cost = 300;
            if (balance < cost) {
                alert(`❌ ${cost} coins.`);
                return;
            }
            balance -= cost;
            superTapActive = true;
            superTapMultiplier = 10;
            // Super taps last for 30 taps
            setTimeout(() => {
                superTapActive = false;
                superTapMultiplier = 1;
                updateUI();
                alert('🔥 Super Taps expired!');
            }, 30000); // 30 seconds
            updateUI();
            closeModal();
            alert(`🔥 Super Taps activated! ×10 power for 30 taps!`);
            handleBoost();
        }

        window.upgradeBoost = upgradeBoost;
        window.buySuperTaps = buySuperTaps;

        // --- MODAL ---
        function openModal(title, contentHTML) {
            modalTitle.textContent = title;
            modalContent.innerHTML = contentHTML;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        window.closeModal = closeModal;

        // --- FRIENDS / REFERRALS ---
        function handleFriends() {
            const inviteLink = 'https://e-coin.app/invite/' + Math.random().toString(36).substring(2, 10);
            openModal('👥 Invite Friends', `
                <p>Invite your friends and earn <strong>100 coins</strong> for each invite!</p>
                <div class="referral-bonus">
                    <div class="big">👥 ${referrals}</div>
                    <div class="sub">Total Referrals</div>
                </div>
                <div class="invite-link">${inviteLink}</div>
                <button class="copy-btn" onclick="navigator.clipboard?.writeText('${inviteLink}') && alert('Link copied!')">📋 Copy Link</button>
                <button class="verify-btn" onclick="simulateReferral()" style="margin-top:6px;background:#f3ba2f;border:none;padding:6px 16px;border-radius:30px;font-weight:700;cursor:pointer;margin:4px auto;display:block;font-size:13px;">➕ Simulate Referral</button>
                <p style="margin-top:6px;font-size:10px;color:#8a7a54;">Share this link with your friends</p>
            `);
        }

        function simulateReferral() {
            referrals += 1;
            const reward = 100;
            balance += reward;
            ceoCoins += reward;
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 50);
            updateUI();
            alert(`🎉 New referral! +${reward} coins and +50 taps! Total referrals: ${referrals}`);
            handleFriends();
        }

        window.simulateReferral = simulateReferral;

        // --- AIRDROP ---
        function handleAirdrop() {
            const dollarValue = (balance / 1000).toFixed(2);
            openModal('🎯 Airdrop', `
                <div class="airdrop-info">
                    <div class="row"><span class="label">Your Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Value (USD)</span><span class="value">$${dollarValue}</span></div>
                    <div class="row"><span class="label">Rate</span><span class="value">1 coin = $0.001</span></div>
                    <div class="row"><span class="label">Min. Withdraw</span><span class="value">1,000 coins</span></div>
                </div>
                <p style="font-size:10px;color:#8a7a54;">Connect your Binance wallet to withdraw</p>
                <button style="background:#f3ba2f;border:none;padding:8px;border-radius:40px;font-weight:700;width:100%;cursor:pointer;margin-top:4px;" onclick="connectBinance()">
                    🔗 Connect Binance Wallet
                </button>
            `);
        }

        function connectBinance() {
            alert('🔗 Binance Wallet connecting...\n\n✅ Wallet connected successfully!\n🎁 You received 50 bonus coins!');
            balance += 50;
            ceoCoins += 50;
            updateUI();
            closeModal();
        }

        window.connectBinance = connectBinance;

        // --- EXCHANGE ---
        function handleExchange() {
            openModal('📈 Exchange', `
                <p>Trade your coins for special perks!</p>
                <div class="airdrop-info">
                    <div class="row"><span class="label">Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Exchange Rate</span><span class="value">1 coin = 0.001 ETH</span></div>
                </div>
                <button style="background:#f3ba2f;border:none;padding:8px;border-radius:40px;font-weight:700;width:100%;cursor:pointer;margin-top:4px;" onclick="alert('Exchange feature coming soon!')">
                    Exchange Now
                </button>
            `);
        }

        // --- AI ASSISTANT ---
        function handleAI() {
            openModal('🤖 E-Coin AI', `
                <p>I'm your E-Coin AI Assistant! Ask me anything.</p>
                <div style="background:#0e0c07;padding:10px;border-radius:14px;border:1px solid #2f281c;margin:6px 0;max-height:150px;overflow-y:auto;">
                    <div style="color:#f3ba2f;font-size:12px;">👋 Hello! How can I help you today?</div>
                </div>
                <div style="display:flex;gap:6px;margin-top:6px;">
                    <input type="text" id="aiInput" placeholder="Ask me..." style="flex:1;padding:5px 10px;border-radius:30px;border:1px solid #2f281c;background:#0e0c07;color:#e5d6b0;font-size:12px;outline:none;" onkeydown="if(event.key==='Enter') askAI()" />
                    <button onclick="askAI()" style="background:#f3ba2f;border:none;padding:5px 12px;border-radius:30px;font-weight:700;cursor:pointer;font-size:12px;">Ask</button>
                </div>
                <div style="margin-top:6px;text-align:center;font-size:10px;color:#8a7a54;">
                    <span class="admin-badge">ADMIN</span> E-Coin AI v1.0
                </div>
            `);
            setTimeout(() => {
                const input = document.getElementById('aiInput');
                if (input) input.focus();
            }, 300);
        }

        window.askAI = function() {
            const input = document.getElementById('aiInput');
            if (!input) return;
            const q = input.value.trim();
            if (!q) return;
            const response = generateAIResponse(q);
            const chatDiv = document.querySelector('#modalContent div:first-child');
            if (chatDiv) {
                chatDiv.innerHTML += `<div style="color:#e5d6b0;font-size:12px;margin-top:4px;">You: ${q}</div>`;
                chatDiv.innerHTML += `<div style="color:#f3ba2f;font-size:12px;margin-top:4px;">AI: ${response}</div>`;
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
            input.value = '';
        };

        function generateAIResponse(question) {
            const q = question.toLowerCase();
            if (q.includes('balance') || q.includes('coin')) {
                return `💰 You have ${balance.toLocaleString()} coins! Keep tapping!`;
            }
            if (q.includes('tap') || q.includes('power')) {
                return `⚡ Tap power: +${tapPower} per tap. Boost level: ${boostLevel}`;
            }
            if (q.includes('level')) {
                return `🏆 Level ${getLevel(balance)}. Need ${getNextLevelThreshold(balance).toLocaleString()} coins for next level.`;
            }
            if (q.includes('referral') || q.includes('friend')) {
                return `👥 You have ${referrals} referrals! Each gives 100 coins.`;
            }
            if (q.includes('super')) {
                return `🔥 Super Taps ${superTapActive ? 'ACTIVE! ×' + superTapMultiplier : 'inactive'}. Buy for 300 coins in Boost!`;
            }
            if (q.includes('help')) {
                return `🆘 Ask about: balance, tap power, level, referrals, super taps, airdrop, or social links.`;
            }
            if (q.includes('telegram')) {
                return `📱 Join Telegram: https://t.me/OneWinTokenBot/start?startapp=refId8467180571`;
            }
            if (q.includes('tiktok')) {
                return `🎵 TikTok: https://www.tiktok.com/@esl9151`;
            }
            if (q.includes('instagram') || q.includes('ig')) {
                return `📸 Instagram: https://instagram.com/ecoin.official`;
            }
            if (q.includes('facebook') || q.includes('fb')) {
                return `📘 Facebook: https://facebook.com/ecoin.official`;
            }
            return `🤔 Not sure about that. Try asking about: balance, tap power, level, referrals, super taps, or social links.`;
        }

        // --- EVENTS ---
        boostBtn.addEventListener('click', handleBoost);
        friendsBtn.addEventListener('click', handleFriends);
        airdropBtn.addEventListener('click', handleAirdrop);
        exchangeBtn.addEventListener('click', handleExchange);
        aiBtn.addEventListener('click', handleAI);

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // --- NAV ---
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // --- CEO DOUBLE CLICK ---
        ceoTag.addEventListener('dblclick', function() {
            ceoCoins += 500;
            balance += 100;
            tapsRemaining = Math.min(MAX_TAPS, tapsRemaining + 100);
            updateUI();
            this.style.color = '#f3ba2f';
            setTimeout(() => this.style.color = '', 300);
        });

        // --- USER CLICK FOR PROFILE ---
        userInfo.addEventListener('click', function() {
            openModal('👤 Admin Profile', `
                <div class="user-profile">
                    <div class="avatar-lg">${avatarDisplay.innerHTML || '👩'}</div>
                    <div class="info">
                        <div class="name">${userName} <span class="admin-badge">ADMIN</span></div>
                        <div class="handle">@${userName.toLowerCase().replace(' ', '_')}</div>
                    </div>
                </div>
                <div class="airdrop-info">
                    <div class="row"><span class="label">Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Level</span><span class="value">${getLevel(balance)}</span></div>
                    <div class="row"><span class="label">Referrals</span><span class="value">${referrals}</span></div>
                    <div class="row"><span class="label">Tap Power</span><span class="value">+${tapPower}</span></div>
                    <div class="row"><span class="label">Taps Left</span><span class="value">${Math.floor(tapsRemaining).toLocaleString()}</span></div>
                    <div class="row"><span class="label">Super Taps</span><span class="value">${superTapActive ? '✅ ACTIVE ×' + superTapMultiplier : '❌ Inactive'}</span></div>
                </div>
                <div class="social-links">
                    <a href="https://t.me/OneWinTokenBot/start?startapp=refId8467180571" target="_blank"><span class="icon">📱</span> Telegram</a>
                    <a href="https://www.tiktok.com/@esl9151" target="_blank"><span class="icon">🎵</span> TikTok</a>
                    <a href="https://instagram.com/ecoin.official" target="_blank"><span class="icon">📸</span> IG</a>
                    <a href="https://facebook.com/ecoin.official" target="_blank"><span class="icon">📘</span> FB</a>
                </div>
                <p style="font-size:10px;color:#8a7a54;">Follow us on social media for updates and bonuses!</p>
                <button class="verify-btn" onclick="closeModal()" style="margin-top:6px;">Close</button>
            `);
        });

        // --- INIT ---
        const today = new Date().toDateString();
        const lastDate = localStorage.getItem('eco_last_date');
        if (!lastDate || lastDate !== today) {
            dailyClaimed = false;
            cipherClaimed = false;
            comboClaimed = false;
            tapsRemaining = MAX_TAPS;
            localStorage.setItem('eco_last_date', today);
            saveState();
        }

        updateTimers();
        updateUI();
        setInterval(updateTimers, 1000);

        setInterval(() => {
            if (progress < maxProgress) {
                progress = Math.min(maxProgress, progress + 2);
                updateUI(1.);
            }
        }, 2000);

        console.log('💰 E-Coin loaded!');
        console.log('⚡ Tap power:', tapPower);
        console.log('🔋 Taps remaining:', tapsRemaining);
        console.log('👥 Referrals:', referrals);
        console.log('🔥 Super Taps:', superTapActive ? 'ACTIVE' : 'Inactive');
        console.log('💾 Data saved in localStorage with key:', STORAGE_KEY);
    })();
</script>
</body>
