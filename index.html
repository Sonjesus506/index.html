<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>E-Coin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
            color: #f0e6d0;
            position: fixed;
        }
        .app {
            width: 100%;
            height: 100%;
            background: #12100d;
            display: flex;
            flex-direction: column;
            padding: 10px 12px 8px;
            overflow: hidden;
            position: relative;
        }
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1a1610;
            padding: 3px 12px 3px 5px;
            border-radius: 40px;
            border: 1px solid #3d321f;
        }
        .avatar {
            width: 28px;
            height: 28px;
            background: linear-gradient(135deg, #f3ba2f, #d49c1a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #0e0c07;
            font-size: 12px;
        }
        .user-info span {
            font-weight: 500;
            font-size: 12px;
            color: #e5d6b0;
        }
        .badge {
            background: #2f2a1a;
            color: #f3ba2f;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid #4f3d1f;
        }

        /* Balance */
        .balance-card {
            background: #1a1610;
            border-radius: 18px;
            padding: 10px 12px 8px;
            text-align: center;
            border: 1px solid #2f281c;
            margin-bottom: 6px;
            flex-shrink: 0;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.6);
        }
        .balance-card .label {
            font-size: 9px;
            color: #b0945a;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .balance-card .amount {
            font-size: 2.4rem;
            font-weight: 700;
            color: #fad974;
            line-height: 1.1;
            text-shadow: 0 0 30px #f3ba2f20;
            letter-spacing: 1px;
        }
        .balance-card .stats {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin-top: 3px;
            font-size: 11px;
            color: #bdaa7a;
        }
        .balance-card .stats span {
            background: #0e0c07;
            padding: 1px 12px;
            border-radius: 40px;
            border: 1px solid #2f281c;
        }

        /* Level */
        .level-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1610;
            border-radius: 30px;
            padding: 3px 12px 3px 14px;
            border: 1px solid #2f281c;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .level-row .level-badge {
            font-size: 12px;
            font-weight: 600;
            color: #f3ba2f;
        }
        .level-row .level-badge span {
            color: #e5d6b0;
            font-weight: 400;
        }
        .level-row .next-level {
            font-size: 10px;
            color: #8a7a54;
        }

        /* Timer Grid - Daily Tasks */
        .timer-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .timer-item {
            background: #19150f;
            border-radius: 12px;
            padding: 6px 4px;
            text-align: center;
            border: 1px solid #2d2417;
            cursor: pointer;
            transition: background 0.2s;
        }
        .timer-item:active {
            background: #2a2215;
        }
        .timer-item .value {
            font-size: 0.9rem;
            font-weight: 700;
            color: #f3ba2f;
        }
        .timer-item .desc {
            font-size: 7px;
            text-transform: uppercase;
            color: #8a7a54;
            letter-spacing: 0.3px;
            margin-top: 1px;
        }

        /* Progress */
        .progress-row {
            background: #1a1610;
            border-radius: 40px;
            padding: 4px 14px 4px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #2f281c;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .progress-row .left {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            flex: 1;
        }
        .progress-row .left .fill {
            flex: 1;
            height: 4px;
            background: #2a2215;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-row .left .fill .bar {
            height: 100%;
            background: linear-gradient(90deg, #f3ba2f, #d49c1a);
            border-radius: 10px;
            transition: width 0.2s;
        }
        .progress-row .right {
            background: #f3ba2f;
            color: #0e0c07;
            font-weight: 700;
            padding: 3px 14px;
            border-radius: 30px;
            font-size: 11px;
            cursor: pointer;
            transition: 0.08s;
            box-shadow: 0 3px 0 #876a1a;
            border: none;
            flex-shrink: 0;
        }
        .progress-row .right:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #876a1a;
        }

        /* Coin wrapper with floating texts */
        .coin-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 0;
            position: relative;
            margin: 2px 0;
            overflow: visible;
        }
        .coin {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle at 35% 30%, #fce181, #d49c1a 50%, #b8860b 75%, #8a6b0e);
            border-radius: 50%;
            border: 8px solid #f9d342;
            box-shadow: 0 0 0 3px #6b4f0e, 0 12px 40px rgba(243, 186, 47, 0.4), inset 0 -10px 30px rgba(0,0,0,0.5), inset 0 10px 30px rgba(255,215,0,0.2);
            cursor: pointer;
            transition: transform 0.06s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            touch-action: manipulation;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            font-weight: 900;
            color: #8a6b0e;
            text-shadow: 0 2px 10px rgba(255,215,0,0.3), 0 -2px 10px rgba(139,107,14,0.3);
            letter-spacing: -2px;
        }
        .coin:active {
            transform: scale(0.88);
        }
        /* Inner rim for realistic coin look */
        .coin::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.15);
            pointer-events: none;
        }
        .coin::after {
            content: 'E';
            position: relative;
            z-index: 1;
            font-size: 5.5rem;
            font-weight: 900;
            color: #7a5f0e;
            text-shadow: 0 2px 4px rgba(255,215,0,0.2), 0 -2px 4px rgba(0,0,0,0.3);
            font-family: 'Georgia', serif;
        }

        /* Floating +N effect */
        .float-text {
            position: absolute;
            font-size: 2.2rem;
            font-weight: 800;
            color: #f3ba2f;
            text-shadow: 0 0 20px #f3ba2f, 0 0 40px #f3ba2f80, 0 0 60px #f3ba2f40;
            pointer-events: none;
            z-index: 10;
            animation: floatUp 0.9s ease-out forwards;
            font-family: 'Segoe UI', sans-serif;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            30% { opacity: 1; transform: translateY(-20px) scale(1.1); }
            100% { opacity: 0; transform: translateY(-140px) scale(1.3); }
        }

        .coin-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .ceo-tag {
            background: #1f1a0f;
            padding: 2px 14px 2px 10px;
            border-radius: 40px;
            font-size: 11px;
            border: 1px solid #3d321f;
            color: #d4bb7a;
            cursor: pointer;
        }
        .ceo-tag span {
            color: #f3ba2f;
            font-weight: 600;
        }
        .small-balance {
            font-size: 12px;
            color: #8a7a54;
        }

        /* Action Grid - Exchange, Friends, Airdrop */
        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 5px;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .action-btn {
            background: #1a1610;
            border: 1px solid #2f281c;
            border-radius: 30px;
            padding: 8px 0;
            text-align: center;
            font-weight: 600;
            font-size: 11px;
            color: #e5d6b0;
            cursor: pointer;
            transition: 0.08s;
            box-shadow: 0 3px 0 #0a0806;
            border: none;
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0a0806;
        }
        .action-btn.gold {
            background: #f3ba2f;
            border-color: #f3ba2f;
            color: #0b0a08;
            box-shadow: 0 3px 0 #876a1a;
        }
        .action-btn.gold:active {
            background: #dbaa24;
        }

        /* Bottom Nav */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            background: #14110d;
            border-radius: 40px;
            padding: 3px 6px;
            border: 1px solid #2f281c;
            flex-shrink: 0;
            margin-top: 3px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px 6px;
            border-radius: 30px;
            font-size: 9px;
            color: #7a6a4a;
            cursor: pointer;
            background: transparent;
            border: none;
            font-weight: 500;
            gap: 1px;
            transition: 0.1s;
            flex: 1;
        }
        .nav-item .icon {
            font-size: 16px;
            line-height: 1;
        }
        .nav-item.active {
            color: #f3ba2f;
            background: #1e1a12;
        }
        .nav-item:active {
            opacity: 0.6;
        }

        .footer-airdrop {
            text-align: center;
            font-size: 9px;
            color: #4d3f28;
            letter-spacing: 1px;
            border-top: 1px solid #1f1a10;
            padding-top: 4px;
            flex-shrink: 0;
            margin-top: 3px;
        }
        .footer-airdrop span {
            background: #1a1610;
            padding: 2px 16px;
            border-radius: 40px;
            border: 1px solid #2f281c;
            color: #f3ba2f;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            backdrop-filter: blur(6px);
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #1a1610;
            border: 1px solid #3d321f;
            border-radius: 30px;
            padding: 24px 20px 20px;
            max-width: 340px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-box h2 {
            color: #f3ba2f;
            font-size: 1.3rem;
            margin-bottom: 14px;
            text-align: center;
        }
        .modal-box p {
            color: #bdaa7a;
            font-size: 13px;
            margin-bottom: 10px;
            text-align: center;
        }
        .modal-box .close-btn {
            background: #f3ba2f;
            border: none;
            padding: 10px;
            border-radius: 40px;
            font-weight: 700;
            color: #0e0c07;
            width: 100%;
            font-size: 15px;
            cursor: pointer;
            margin-top: 8px;
        }
        .modal-box .invite-link {
            background: #0e0c07;
            padding: 10px;
            border-radius: 16px;
            border: 1px solid #2f281c;
            color: #f3ba2f;
            font-size: 13px;
            word-break: break-all;
            margin: 10px 0;
            text-align: center;
        }
        .modal-box .copy-btn {
            background: #2f281c;
            border: none;
            padding: 6px 18px;
            border-radius: 30px;
            color: #f3ba2f;
            font-weight: 600;
            cursor: pointer;
            margin: 4px auto;
            display: block;
        }
        .modal-box .airdrop-info {
            background: #0e0c07;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid #2f281c;
            margin: 8px 0;
        }
        .modal-box .airdrop-info .row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-size: 13px;
        }
        .modal-box .airdrop-info .row .label {
            color: #8a7a54;
        }
        .modal-box .airdrop-info .row .value {
            color: #f3ba2f;
            font-weight: 600;
        }
        .modal-box .boost-option {
            background: #0e0c07;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #2f281c;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-box .boost-option button {
            background: #f3ba2f;
            border: none;
            padding: 5px 14px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
        .modal-box .boost-option .cost {
            color: #8a7a54;
            font-size: 11px;
        }
        .modal-box .task-item {
            background: #0e0c07;
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid #2f281c;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-box .task-item .task-name {
            color: #e5d6b0;
            font-size: 13px;
        }
        .modal-box .task-item .task-reward {
            color: #f3ba2f;
            font-size: 12px;
            font-weight: 600;
        }
        .modal-box .task-item button {
            background: #f3ba2f;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 11px;
        }
        .modal-box .social-link {
            color: #f3ba2f;
            text-decoration: underline;
            word-break: break-all;
        }
        .modal-box .verify-btn {
            background: #f3ba2f;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            margin: 6px auto;
            display: block;
            font-size: 14px;
        }
        .tap-power-display {
            background: #0e0c07;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 10px;
            color: #f3ba2f;
            border: 1px solid #2f281c;
        }

        /* Mobile responsive */
        @media (max-width: 420px) {
            .coin {
                width: 150px;
                height: 150px;
                font-size: 4rem;
            }
            .coin::after {
                font-size: 4.5rem;
            }
        }
        @media (max-width: 360px) {
            .coin {
                width: 130px;
                height: 130px;
                font-size: 3.5rem;
            }
            .coin::after {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>
<div class="app" id="app">

    <!-- Header -->
    <div class="header">
        <div class="user-info">
            <div class="avatar">👩</div>
            <span>Jane <span style="color:#b0945a;font-weight:300;">(CEO)</span></span>
        </div>
        <div class="badge">Silver ▾</div>
    </div>

    <!-- Balance -->
    <div class="balance-card">
        <div class="label">💰 BALANCE</div>
        <div class="amount" id="balanceDisplay">0</div>
        <div class="stats">
            <span>2 / 11</span>
            <span>⚡ +207 /h</span>
        </div>
    </div>

    <!-- Level -->
    <div class="level-row">
        <div class="level-badge">🏆 Level <span id="levelDisplay">1</span></div>
        <div class="next-level" id="nextLevelDisplay">Next: 1,000 coins</div>
    </div>

    <!-- Timer Grid - Daily Tasks -->
    <div class="timer-grid">
        <div class="timer-item" onclick="claimDaily()">
            <div class="value" id="dailyTimer">05:35</div>
            <div class="desc">Daily reward</div>
        </div>
        <div class="timer-item" onclick="claimCipher()">
            <div class="value" id="cipherTimer">00:56</div>
            <div class="desc">Daily cipher</div>
        </div>
        <div class="timer-item" onclick="claimCombo()">
            <div class="value" id="comboTimer">02:04</div>
            <div class="desc">Daily combo</div>
        </div>
    </div>

    <!-- Progress -->
    <div class="progress-row">
        <div class="left">
            <span>$</span>
            <div class="fill"><div class="bar" id="progressBar" style="width:0%"></div></div>
        </div>
        <button class="right" id="boostBtn">Boost</button>
    </div>

    <!-- Coin -->
    <div class="coin-wrapper" id="coinWrapper">
        <div class="coin" id="mainCoin" role="button" aria-label="Tap to earn"></div>
    </div>

    <!-- CEO & Balance -->
    <div class="coin-label">
        <div class="ceo-tag" id="ceoTag">👑 (CEO) <span id="ceoCoinCount">0</span></div>
        <div class="small-balance">🪙 <span id="balanceSmall">0</span></div>
    </div>

    <!-- Action Grid - Exchange, Friends, Airdrop -->
    <div class="action-grid">
        <button class="action-btn gold" id="exchangeBtn">Exchange</button>
        <button class="action-btn" id="friendsBtn">👥 Friends</button>
        <button class="action-btn" id="airdropBtn">🎯 Airdrop</button>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <button class="nav-item active"><span class="icon">🏠</span>Home</button>
        <button class="nav-item"><span class="icon">🔍</span>Search</button>
        <button class="nav-item"><span class="icon">🔔</span>Notif.</button>
        <button class="nav-item"><span class="icon">⚡</span>Activity</button>
    </div>

    <div class="footer-airdrop">
        <span>✦ Airdrop active ✦</span>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
        <h2 id="modalTitle">Modal</h2>
        <div id="modalContent"></div>
        <button class="close-btn" id="modalClose">Close</button>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // DOM
        const balanceDisplay = document.getElementById('balanceDisplay');
        const balanceSmall = document.getElementById('balanceSmall');
        const ceoCoinCount = document.getElementById('ceoCoinCount');
        const coinEl = document.getElementById('mainCoin');
        const coinWrapper = document.getElementById('coinWrapper');
        const dailyTimer = document.getElementById('dailyTimer');
        const cipherTimer = document.getElementById('cipherTimer');
        const comboTimer = document.getElementById('comboTimer');
        const progressBar = document.getElementById('progressBar');
        const boostBtn = document.getElementById('boostBtn');
        const levelDisplay = document.getElementById('levelDisplay');
        const nextLevelDisplay = document.getElementById('nextLevelDisplay');
        const ceoTag = document.getElementById('ceoTag');

        const exchangeBtn = document.getElementById('exchangeBtn');
        const friendsBtn = document.getElementById('friendsBtn');
        const airdropBtn = document.getElementById('airdropBtn');

        const modalOverlay = document.getElementById('modalOverlay');
        const modalBox = document.getElementById('modalBox');
        const modalTitle = document.getElementById('modalTitle');
        const modalContent = document.getElementById('modalContent');
        const modalClose = document.getElementById('modalClose');

        // --- PERSISTENT STORAGE ---
        const STORAGE_KEY = 'eco_app_data_v4';

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (raw) {
                    const data = JSON.parse(raw);
                    return data;
                }
            } catch (e) {}
            return null;
        }

        function saveData(data) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            } catch (e) {}
        }

        // --- STATE ---
        let saved = loadData();
        let balance = saved?.balance || 0;
        let ceoCoins = saved?.ceoCoins || 0;
        let progress = saved?.progress || 0;
        let tapPower = saved?.tapPower || 1;
        let boostLevel = saved?.boostLevel || 1;
        let dailyClaimed = saved?.dailyClaimed || false;
        let cipherClaimed = saved?.cipherClaimed || false;
        let comboClaimed = saved?.comboClaimed || false;
        let facebookFollowed = saved?.facebookFollowed || false;
        let twitterFollowed = saved?.twitterFollowed || false;
        let telegramJoined = saved?.telegramJoined || false;
        const maxProgress = 1500;

        function getLevel(coins) {
            if (coins < 1000) return 1;
            return Math.floor(coins / 1000) + 1;
        }

        function getNextLevelThreshold(coins) {
            const current = getLevel(coins);
            return current * 1000;
        }

        function getBoostCost() {
            return 500 * Math.pow(2, boostLevel - 1);
        }

        function saveState() {
            saveData({
                balance: balance,
                ceoCoins: ceoCoins,
                progress: progress,
                tapPower: tapPower,
                boostLevel: boostLevel,
                dailyClaimed: dailyClaimed,
                cipherClaimed: cipherClaimed,
                comboClaimed: comboClaimed,
                facebookFollowed: facebookFollowed,
                twitterFollowed: twitterFollowed,
                telegramJoined: telegramJoined
            });
        }

        function updateUI() {
            const formatted = balance.toLocaleString();
            balanceDisplay.textContent = formatted;
            balanceSmall.textContent = formatted;
            ceoCoinCount.textContent = ceoCoins.toLocaleString();

            const pct = Math.min(100, (progress / maxProgress) * 100);
            progressBar.style.width = pct + '%';

            const newLevel = getLevel(balance);
            levelDisplay.textContent = newLevel;
            const nextThreshold = getNextLevelThreshold(balance);
            nextLevelDisplay.textContent = `Next: ${nextThreshold.toLocaleString()} coins`;

            saveState();
        }

        // --- FLOATING +N TEXT ---
        function createFloatText(x, y, amount) {
            const el = document.createElement('div');
            el.className = 'float-text';
            el.textContent = `+${amount}`;
            el.style.left = (x - 25) + 'px';
            el.style.top = (y - 15) + 'px';
            const offsetX = (Math.random() - 0.5) * 30;
            el.style.transform = `translateX(${offsetX}px)`;
            coinWrapper.appendChild(el);
            setTimeout(() => el.remove(), 900);
        }

        // --- TAP ---
        function handleTap(e) {
            e.preventDefault?.();
            const amount = tapPower;
            balance += amount;
            ceoCoins += amount;
            if (progress < maxProgress) {
                progress = Math.min(maxProgress, progress + amount);
            }
            updateUI();

            const rect = coinEl.getBoundingClientRect();
            const wrapperRect = coinWrapper.getBoundingClientRect();
            const cx = rect.left - wrapperRect.left + rect.width / 2;
            const cy = rect.top - wrapperRect.top + 10;
            createFloatText(cx, cy, amount);

            coinEl.style.transform = 'scale(0.86)';
            setTimeout(() => coinEl.style.transform = '', 80);
        }

        // --- TIMERS ---
        function updateTimers() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            let diff = Math.max(0, (midnight - now) / 1000);
            const dh = Math.floor(diff / 3600);
            const dm = Math.floor((diff % 3600) / 60);
            dailyTimer.textContent = `${String(dh).padStart(2,'0')}:${String(dm).padStart(2,'0')}`;

            const secs = now.getSeconds();
            const fakeCipher = 60 - (secs % 60);
            cipherTimer.textContent = `00:${String(fakeCipher).padStart(2,'0')}`;

            const comboMin = Math.floor((secs % 30) / 2);
            const comboSec = secs % 30;
            comboTimer.textContent = `${String(comboMin).padStart(2,'0')}:${String(comboSec).padStart(2,'0')}`;

            const today = now.toDateString();
            const lastDate = localStorage.getItem('eco_last_date');
            if (lastDate !== today) {
                dailyClaimed = false;
                cipherClaimed = false;
                comboClaimed = false;
                localStorage.setItem('eco_last_date', today);
                saveState();
            }
        }

        // --- DAILY TASK CLAIMS ---
        function claimDaily() {
            if (dailyClaimed) {
                alert('✅ Daily reward already claimed! Come back tomorrow.');
                return;
            }
            const reward = 100;
            balance += reward;
            ceoCoins += reward;
            dailyClaimed = true;
            updateUI();
            alert(`🎉 Daily reward claimed! +${reward} coins`);
        }

        function claimCipher() {
            if (cipherClaimed) {
                alert('✅ Daily cipher already claimed! Come back tomorrow.');
                return;
            }
            const reward = 50;
            balance += reward;
            ceoCoins += reward;
            cipherClaimed = true;
            updateUI();
            alert(`🔐 Cipher claimed! +${reward} coins`);
        }

        function claimCombo() {
            if (comboClaimed) {
                alert('✅ Daily combo already claimed! Come back tomorrow.');
                return;
            }
            const reward = 75;
            balance += reward;
            ceoCoins += reward;
            comboClaimed = true;
            updateUI();
            alert(`🔥 Combo claimed! +${reward} coins`);
        }

        window.claimDaily = claimDaily;
        window.claimCipher = claimCipher;
        window.claimCombo = claimCombo;

        // --- SOCIAL TASKS ---
        function showSocialTasks() {
            let html = `
                <p>Complete social tasks to earn free coins!</p>
                <div class="task-item">
                    <div>
                        <div class="task-name">📘 Follow Facebook</div>
                        <div class="task-reward">+200 coins</div>
                    </div>
                    ${facebookFollowed ? '<span style="color:#4CAF50;">✅ Done</span>' : `<button onclick="startFacebookTask()">Follow</button>`}
                </div>
                <div class="task-item">
                    <div>
                        <div class="task-name">🐦 Follow Twitter</div>
                        <div class="task-reward">+150 coins</div>
                    </div>
                    ${twitterFollowed ? '<span style="color:#4CAF50;">✅ Done</span>' : `<button onclick="startTwitterTask()">Follow</button>`}
                </div>
                <div class="task-item">
                    <div>
                        <div class="task-name">💬 Join Telegram</div>
                        <div class="task-reward">+100 coins</div>
                    </div>
                    ${telegramJoined ? '<span style="color:#4CAF50;">✅ Done</span>' : `<button onclick="startTelegramTask()">Join</button>`}
                </div>
                <p style="font-size:11px;color:#8a7a54;margin-top:8px;">Complete all tasks to earn bonus rewards!</p>
            `;
            openModal('📱 Social Tasks', html);
        }

        function startFacebookTask() {
            const fbLink = 'https://facebook.com/ecoin.official';
            openModal('📘 Follow Facebook', `
                <p>Follow our Facebook page to earn <strong>200 coins</strong>!</p>
                <p style="font-size:14px;margin:12px 0;">
                    <a href="${fbLink}" target="_blank" class="social-link">${fbLink}</a>
                </p>
                <button class="verify-btn" onclick="verifyFacebook()">✅ I've Followed</button>
                <p style="font-size:11px;color:#8a7a54;">Make sure you're logged in and follow the page</p>
            `);
        }

        function verifyFacebook() {
            if (facebookFollowed) {
                alert('✅ Already verified!');
                return;
            }
            facebookFollowed = true;
            const reward = 200;
            balance += reward;
            ceoCoins += reward;
            updateUI();
            closeModal();
            alert(`🎉 Facebook follow verified! +${reward} coins`);
            showSocialTasks();
        }

        function startTwitterTask() {
            const twitterLink = 'https://twitter.com/ecoin_official';
            openModal('🐦 Follow Twitter', `
                <p>Follow our Twitter page to earn <strong>150 coins</strong>!</p>
                <p style="font-size:14px;margin:12px 0;">
                    <a href="${twitterLink}" target="_blank" class="social-link">${twitterLink}</a>
                </p>
                <button class="verify-btn" onclick="verifyTwitter()">✅ I've Followed</button>
                <p style="font-size:11px;color:#8a7a54;">Make sure you're logged in and follow the page</p>
            `);
        }

        function verifyTwitter() {
            if (twitterFollowed) {
                alert('✅ Already verified!');
                return;
            }
            twitterFollowed = true;
            const reward = 150;
            balance += reward;
            ceoCoins += reward;
            updateUI();
            closeModal();
            alert(`🎉 Twitter follow verified! +${reward} coins`);
            showSocialTasks();
        }

        function startTelegramTask() {
            const telegramLink = 'https://t.me/ecoin_official';
            openModal('💬 Join Telegram', `
                <p>Join our Telegram group to earn <strong>100 coins</strong>!</p>
                <p style="font-size:14px;margin:12px 0;">
                    <a href="${telegramLink}" target="_blank" class="social-link">${telegramLink}</a>
                </p>
                <button class="verify-btn" onclick="verifyTelegram()">✅ I've Joined</button>
                <p style="font-size:11px;color:#8a7a54;">Make sure you're logged in and join the group</p>
            `);
        }

        function verifyTelegram() {
            if (telegramJoined) {
                alert('✅ Already verified!');
                return;
            }
            telegramJoined = true;
            const reward = 100;
            balance += reward;
            ceoCoins += reward;
            updateUI();
            closeModal();
            alert(`🎉 Telegram join verified! +${reward} coins`);
            showSocialTasks();
        }

        window.startFacebookTask = startFacebookTask;
        window.verifyFacebook = verifyFacebook;
        window.startTwitterTask = startTwitterTask;
        window.verifyTwitter = verifyTwitter;
        window.startTelegramTask = startTelegramTask;
        window.verifyTelegram = verifyTelegram;

        // --- BOOST ---
        function handleBoost() {
            const cost = getBoostCost();
            const nextPower = tapPower + 1;
            openModal('⚡ Boost', `
                <p>Increase your tap power!</p>
                <div class="boost-option">
                    <div>
                        <strong style="color:#f3ba2f;">Current: +${tapPower} per tap</strong>
                        <div class="cost">Next level: +${nextPower} per tap</div>
                    </div>
                    <button onclick="upgradeBoost()">Upgrade</button>
                </div>
                <div class="airdrop-info">
                    <div class="row"><span class="label">Cost</span><span class="value">${cost.toLocaleString()} coins</span></div>
                    <div class="row"><span class="label">Your coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Boost Level</span><span class="value">${boostLevel}</span></div>
                </div>
                <p style="font-size:11px;color:#8a7a54;">Cost doubles each upgrade: 500 → 1,000 → 2,000 → 4,000...</p>
            `);
        }

        function upgradeBoost() {
            const cost = getBoostCost();
            if (balance < cost) {
                alert(`❌ Not enough coins! You need ${cost.toLocaleString()} coins.`);
                return;
            }
            balance -= cost;
            tapPower += 1;
            boostLevel += 1;
            updateUI();
            closeModal();
            alert(`✅ Boost upgraded! Tap power is now +${tapPower}`);
        }

        window.upgradeBoost = upgradeBoost;

        // --- MODAL ---
        function openModal(title, contentHTML) {
            modalTitle.textContent = title;
            modalContent.innerHTML = contentHTML;
            modalOverlay.classList.add('active');
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
        }

        window.closeModal = closeModal;

        // --- FRIENDS / INVITE ---
        function handleFriends() {
            const inviteLink = 'https://e-coin.app/invite/' + Math.random().toString(36).substring(2, 10);
            openModal('👥 Invite Friends', `
                <p>Invite your friends and earn <strong>100 coins</strong> for each invite!</p>
                <div class="invite-link">${inviteLink}</div>
                <button class="copy-btn" onclick="navigator.clipboard?.writeText('${inviteLink}') && alert('Link copied!')">📋 Copy Link</button>
                <p style="margin-top:10px;font-size:11px;color:#8a7a54;">Share this link with your friends</p>
                <button class="verify-btn" onclick="showSocialTasks()" style="margin-top:8px;">📱 Social Tasks</button>
            `);
        }

        // --- AIRDROP ---
        function handleAirdrop() {
            const dollarValue = (balance / 1000).toFixed(2);
            openModal('🎯 Airdrop', `
                <div class="airdrop-info">
                    <div class="row"><span class="label">Your Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Value (USD)</span><span class="value">$${dollarValue}</span></div>
                    <div class="row"><span class="label">Rate</span><span class="value">1 coin = $0.001</span></div>
                    <div class="row"><span class="label">Min. Withdraw</span><span class="value">1,000 coins</span></div>
                </div>
                <p style="font-size:11px;color:#8a7a54;">Connect your Binance wallet to withdraw</p>
                <button style="background:#f3ba2f;border:none;padding:10px;border-radius:40px;font-weight:700;width:100%;cursor:pointer;margin-top:6px;" onclick="connectBinance()">
                    🔗 Connect Binance Wallet
                </button>
                <button class="verify-btn" onclick="showSocialTasks()" style="margin-top:8px;">📱 Social Tasks</button>
            `);
        }

        function connectBinance() {
            alert('🔗 Binance Wallet connecting...\n\n✅ Wallet connected successfully!\n🎁 You received 50 bonus coins!');
            balance += 50;
            ceoCoins += 50;
            updateUI();
            closeModal();
        }

        window.connectBinance = connectBinance;

        // --- EXCHANGE ---
        function handleExchange() {
            openModal('📈 Exchange', `
                <p>Trade your coins for special perks!</p>
                <div class="airdrop-info">
                    <div class="row"><span class="label">Coins</span><span class="value">${balance.toLocaleString()}</span></div>
                    <div class="row"><span class="label">Exchange Rate</span><span class="value">1 coin = 0.001 ETH</span></div>
                </div>
                <button style="background:#f3ba2f;border:none;padding:10px;border-radius:40px;font-weight:700;width:100%;cursor:pointer;margin-top:6px;" onclick="alert('Exchange feature coming soon!')">
                    Exchange Now
                </button>
                <button class="verify-btn" onclick="showSocialTasks()" style="margin-top:8px;">📱 Social Tasks</button>
            `);
        }

        // --- EVENTS ---
        coinEl.addEventListener('click', handleTap);
        coinEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap(e);
        }, { passive: false });

        boostBtn.addEventListener('click', handleBoost);
        friendsBtn.addEventListener('click', handleFriends);
        airdropBtn.addEventListener('click', handleAirdrop);
        exchangeBtn.addEventListener('click', handleExchange);

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) closeModal();
        });

        // Nav items
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Double click CEO for bonus
        ceoTag.addEventListener('dblclick', function() {
            ceoCoins += 500;
            balance += 100;
            updateUI();
            this.style.color = '#f3ba2f';
            setTimeout(() => this.style.color = '', 300);
        });

        // --- INIT ---
        const today = new Date().toDateString();
        const lastDate = localStorage.getItem('eco_last_date');
        if (!lastDate || lastDate !== today) {
            dailyClaimed = false;
            cipherClaimed = false;
            comboClaimed = false;
            localStorage.setItem('eco_last_date', today);
            saveState();
        }

        updateTimers();
        updateUI();
        setInterval(updateTimers, 1000);

        setInterval(() => {
            if (progress < maxProgress) {
                progress = Math.min(maxProgress, progress + 2);
                updateUI();
            }
        }, 2000);

        console.log('💰 E-Coin loaded! Tap power:', tapPower);
        console.log('💾 Data saved in localStorage with key:', STORAGE_KEY);
        console.log('📱 Social tasks:', { facebookFollowed, twitterFollowed, telegramJoined });
        console.log('⚡ Boost level:', boostLevel, 'Next cost:', getBoostCost());
    })();
</script>
</body>
</html>
