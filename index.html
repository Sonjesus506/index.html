<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Coin · Airdrop</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0b0b0b;
            background-image: radial-gradient(circle at 20% 20%, #1f1a0a 0%, #0a0804 100%);
            color: #f0e6d0;
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            padding: 18px 16px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            max-width: 440px;
            width: 100%;
        }
        .countdown {
            background: rgba(255, 215, 0, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid #f3ba2f40;
            border-radius: 60px;
            padding: 12px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #f8d25c;
            text-align: center;
            letter-spacing: 1px;
            box-shadow: 0 0 20px #f3ba2f15;
            margin-bottom: 20px;
            width: 100%;
        }
        .coin-wrapper {
            display: flex;
            justify-content: center;
            margin: 8px 0 12px;
            position: relative;
        }
        .coin {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle at 30% 30%, #fce181, #d49c1a 70%, #8a6b0e);
            border-radius: 50%;
            border: 8px solid #f9d342;
            box-shadow: 0 0 0 2px #6b4f0e, 0 12px 40px rgba(243, 186, 47, 0.6), inset 0 -10px 30px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: transform 0.12s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.15s;
            touch-action: manipulation;
            will-change: transform;
        }
        .coin:active {
            transform: scale(0.92);
            box-shadow: 0 0 0 2px #b8860b, 0 8px 25px #f3ba2f;
        }
        .balance-card {
            background: #14100a;
            border: 1px solid #3d2e14;
            border-radius: 60px;
            padding: 14px 28px;
            margin: 16px 0 18px;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            color: #fad974;
            letter-spacing: 2px;
            box-shadow: inset 0 4px 10px #00000055, 0 6px 12px #00000030;
            backdrop-filter: blur(4px);
            width: 100%;
        }
        .balance-card span {
            background: #1f1a0f;
            padding: 0 18px;
            border-radius: 40px;
            display: inline-block;
            color: #ffe68f;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 28px 0 12px 6px;
            color: #eace7a;
            border-left: 6px solid #f3ba2f;
            padding-left: 14px;
            letter-spacing: -0.2px;
        }
        .task-card {
            background: #18130c;
            border: 1px solid #302614;
            border-radius: 18px;
            padding: 14px 18px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(2px);
            transition: background 0.2s;
            box-shadow: 0 6px 12px #00000030;
        }
        .task-card:hover {
            background: #221d13;
        }
        .task-card span {
            font-weight: 500;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task-card span small {
            color: #b8943a;
            font-weight: 400;
            font-size: 0.8rem;
            background: #1d160c;
            padding: 2px 12px;
            border-radius: 30px;
            margin-left: 8px;
        }
        .btn-claim {
            background: #f3ba2f;
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 700;
            color: #0f0c06;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #876a1a, 0 6px 14px #00000055;
            transition: all 0.08s linear;
            touch-action: manipulation;
            letter-spacing: 0.3px;
        }
        .btn-claim:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #876a1a, 0 6px 14px #00000044;
        }
        .btn-claim.secondary {
            background: #2f281a;
            color: #dbbd5c;
            box-shadow: 0 4px 0 #1a150c;
        }
        .binance-box {
            margin-top: 36px;
            border-top: 1px solid #3a2d18;
            padding-top: 28px;
            width: 100%;
        }
        .binance-box h2 {
            font-weight: 500;
            font-size: 1.5rem;
            color: #f3ba2f;
            letter-spacing: 1px;
            margin: 0 0 16px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .binance-box h2::before {
            content: "◈";
            font-size: 1.6rem;
            color: #f3ba2f;
        }
        .btn-wallet {
            width: 100%;
            padding: 18px 10px;
            background: #0e0c07;
            border: 2px solid #f3ba2f;
            border-radius: 60px;
            color: #f3ba2f;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 20px #f3ba2f10;
            touch-action: manipulation;
        }
        .btn-wallet:active {
            background: #f3ba2f;
            color: #0f0c06;
            transform: scale(0.98);
        }
        .footer-note {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #5f4f2a;
            text-align: center;
            border-top: 1px solid #211b0f;
            padding-top: 22px;
            width: 100%;
        }
        .streak-badge {
            background: #1f180e;
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #dbb75a;
            margin-left: 12px;
            border: 1px solid #3d2f15;
        }
        /* small tap optimization */
        @media (max-width: 480px) {
            .coin { width: 170px; height: 170px; }
            .balance-card { font-size: 1.7rem; padding: 12px 16px; }
        }
    </style>
</head>
<body>
<div class="app-container">

    <!-- Countdown -->
    <div class="countdown" id="timer">⏳ Loading airdrop...</div>

    <!-- Main Coin -->
    <div class="coin-wrapper">
        <div class="coin" id="main-coin" role="button" aria-label="Tap to earn coins"></div>
    </div>

    <!-- Balance -->
    <div class="balance-card">
        🪙 <span id="balance">0</span>
    </div>

    <!-- Daily Tasks -->
    <div class="section-title">📅 Daily streak</div>
    <div class="task-card">
        <span>Daily login <small>streak</small> <span class="streak-badge" id="streakDisplay">0</span></span>
        <button class="btn-claim" id="dailyClaimBtn">Claim</button>
    </div>

    <!-- Social Tasks -->
    <div class="section-title">📱 Social bounty</div>
    <div class="task-card">
        <span>📸 Follow Instagram <small>+500</small></span>
        <button class="btn-claim secondary" data-social="500">Follow</button>
    </div>
    <div class="task-card">
        <span>🐦 Share on X <small>+300</small></span>
        <button class="btn-claim secondary" data-social="300">Share</button>
    </div>
    <div class="task-card">
        <span>💬 Join Telegram <small>+200</small></span>
        <button class="btn-claim secondary" data-social="200">Join</button>
    </div>

    <!-- Binance Airdrop -->
    <div class="binance-box">
        <h2>Binance Airdrop</h2>
        <button class="btn-wallet" id="connectWalletBtn">⟡ Connect Binance Wallet</button>
        <div style="margin-top: 12px; font-size: 0.85rem; color: #b8943a; text-align: center; opacity: 0.8;">⚡ Bonus rewards for wallet holders</div>
    </div>

    <div class="footer-note">E-Coin · tap & earn · 2026</div>
</div>

<script>
    (function() {
        "use strict";

        // ---------- ELEMENTS ----------
        const balanceEl = document.getElementById('balance');
        const coinEl = document.getElementById('main-coin');
        const timerEl = document.getElementById('timer');
        const dailyBtn = document.getElementById('dailyClaimBtn');
        const streakDisplay = document.getElementById('streakDisplay');

        // ---------- LOCAL STORAGE KEYS ----------
        const STORAGE_BALANCE = 'eco_balance';
        const STORAGE_STREAK = 'eco_streak';
        const STORAGE_LAST_CLAIM = 'eco_last_claim'; // timestamp of last daily claim

        // ---------- HELPERS ----------
        function getStorage(key, fallback) {
            try {
                const val = localStorage.getItem(key);
                return val !== null ? JSON.parse(val) : fallback;
            } catch { return fallback; }
        }
        function setStorage(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        // ---------- STATE ----------
        let balance = getStorage(STORAGE_BALANCE, 0);
        let streak = getStorage(STORAGE_STREAK, 0);
        let lastClaimDate = getStorage(STORAGE_LAST_CLAIM, null); // ISO date string

        // ---------- UI UPDATE ----------
        function updateUI() {
            balanceEl.textContent = balance;
            streakDisplay.textContent = streak;
            // Daily button state
            const canClaim = checkDailyAvailable();
            dailyBtn.disabled = !canClaim;
            dailyBtn.style.opacity = canClaim ? '1' : '0.5';
            dailyBtn.textContent = canClaim ? 'Claim' : '✓ Done';
        }

        // ---------- DAILY LOGIC ----------
        function checkDailyAvailable() {
            if (!lastClaimDate) return true;
            const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
            return lastClaimDate !== today;
        }

        function claimDaily() {
            if (!checkDailyAvailable()) {
                alert('✨ You already claimed today! Come back tomorrow.');
                return false;
            }
            // reward = (streak + 1) * 100
            const reward = (streak + 1) * 100;
            balance += reward;
            streak += 1;
            // update storage
            setStorage(STORAGE_BALANCE, balance);
            setStorage(STORAGE_STREAK, streak);
            const today = new Date().toISOString().slice(0, 10);
            setStorage(STORAGE_LAST_CLAIM, today);
            lastClaimDate = today;

            updateUI();
            // haptic feedback (optional)
            dailyBtn.style.transform = 'scale(0.95)';
            setTimeout(() => dailyBtn.style.transform = '', 100);
            return true;
        }

        // ---------- SOCIAL TASKS ----------
        function completeSocialTask(amount) {
            balance += amount;
            setStorage(STORAGE_BALANCE, balance);
            updateUI();
            // small feedback
            const msg = `✅ +${amount} coins!`;
            const old = balanceEl.textContent;
            balanceEl.textContent = balance;
            // visual pulse
            balanceEl.style.color = '#fad974';
            setTimeout(() => balanceEl.style.color = '', 300);
            return true;
        }

        // ---------- COIN TAP ----------
        function handleCoinTap(e) {
            e.preventDefault?.();
            balance += 1;
            setStorage(STORAGE_BALANCE, balance);
            updateUI();
            // micro feedback
            coinEl.style.transform = 'scale(0.92)';
            setTimeout(() => coinEl.style.transform = '', 90);
        }

        // ---------- BINANCE WALLET (demo) ----------
        function connectWallet() {
            alert('🔗 Binance Wallet connection initiated.\n(API integration ready — add your Web3 provider)');
            // placeholder: you can extend with window.BinanceChain or custom logic
        }

        // ---------- COUNTDOWN (Nov 1, 2026) ----------
        function updateCountdown() {
            const target = new Date('2026-11-01T00:00:00').getTime();
            const now = Date.now();
            let diff = target - now;
            if (diff < 0) diff = 0;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            let display = `⏳ Airdrop in ${days}d ${hours}h ${mins}m`;
            if (diff === 0) display = '🚀 Airdrop live!';
            timerEl.textContent = display;
        }

        // ---------- INIT ----------
        function init() {
            // set initial balance
            if (typeof balance === 'number' && !isNaN(balance)) {
                balanceEl.textContent = balance;
            } else {
                balance = 0;
                setStorage(STORAGE_BALANCE, 0);
            }
            if (typeof streak !== 'number' || isNaN(streak)) {
                streak = 0;
                setStorage(STORAGE_STREAK, 0);
            }
            // ensure lastClaimDate is valid
            if (lastClaimDate && typeof lastClaimDate !== 'string') {
                lastClaimDate = null;
                setStorage(STORAGE_LAST_CLAIM, null);
            }
            updateUI();
            updateCountdown();
            setInterval(updateCountdown, 30000);

            // ---- EVENT BINDING ----
            // Coin tap (touch + mouse)
            coinEl.addEventListener('click', handleCoinTap);
            coinEl.addEventListener('touchstart', (e) => {
                e.preventDefault(); // prevent double-tap zoom
                handleCoinTap(e);
            }, { passive: false });

            // Daily claim
            dailyBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const claimed = claimDaily();
                if (claimed) {
                    // Optional: show notification
                }
            });

            // Social tasks (using data-social attribute)
            document.querySelectorAll('[data-social]').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    const amount = parseInt(this.getAttribute('data-social'), 10);
                    if (!isNaN(amount) && amount > 0) {
                        completeSocialTask(amount);
                        // Disable button briefly (cosmetic)
                        this.textContent = '✓ Done';
                        this.disabled = true;
                        this.style.opacity = '0.5';
                        setTimeout(() => {
                            this.textContent = amount >= 500 ? 'Follow' : (amount >= 300 ? 'Share' : 'Join');
                            this.disabled = false;
                            this.style.opacity = '1';
                        }, 800);
                    }
                });
            });

            // Binance connect
            document.getElementById('connectWalletBtn').addEventListener('click', connectWallet);

            // extra: keyboard shortcut for accessibility
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && document.activeElement === coinEl) {
                    handleCoinTap(e);
                }
            });

            // if balance changes from another tab, sync (optional)
            window.addEventListener('storage', (e) => {
                if (e.key === STORAGE_BALANCE) {
                    const newBal = JSON.parse(e.newValue);
                    if (typeof newBal === 'number') {
                        balance = newBal;
                        updateUI();
                    }
                }
            });
        }

        // go
        init();
    })();
</script>
</body>
</html>
