<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>E-Coin - Official Global Platform</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Arial, sans-serif; -webkit-user-select: none; user-select: none; }
        body { background-color: #000000; color: #ffffff; width: 100vw; height: 100vh; overflow: hidden; position: fixed; }
        .app-container { width: 100vw; height: 100vh; background: linear-gradient(180deg, #161001 0%, #000000 100%); display: flex; flex-direction: column; justify-content: space-between; padding: 15px; position: absolute; top: 0; left: 0; overflow-y: auto; }
        .top-profile { display: flex; align-items: center; justify-content: space-between; background: rgba(30, 30, 30, 0.5); padding: 12px; border-radius: 16px; border: 1px solid #2d2002; }
        .profile-left { display: flex; align-items: center; gap: 12px; width: 100%; }
        .avatar-container { position: relative; width: 50px; height: 50px; flex-shrink: 0; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #f3ba2f; background-color: #222; }
        .file-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .user-meta { width: 100%; }
        .user-meta h4 { font-size: 14px; font-weight: bold; color: #fff; }
        .level-container { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .level-title { font-size: 11px; color: #f3ba2f; font-weight: 600; }
        .level-bar-container { width: 100%; max-width: 120px; height: 8px; background: #252525; border-radius: 6px; overflow: hidden; border: 1px solid #444; }
        .level-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffe066, #f3ba2f); transition: width 0.3s ease; }
        .tab-content { display: none; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; width: 100%; padding: 10px 0; }
        .tab-content.active { display: flex; }
        .balance-box { text-align: center; margin-bottom: 20px; }
        .coin-balance { font-size: 46px; font-weight: 800; color: #ffffff; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .gold-coin-icon { width: 40px; height: 40px; background: radial-gradient(circle, #ffe066 0%, #f3ba2f 70%, #947116 100%); border-radius: 50%; box-shadow: 0 0 12px rgba(243, 186, 47, 0.6); }
        .clicker-container { position: relative; width: 240px; height: 240px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; }
        .clicker-circle { width: 210px; height: 210px; background: radial-gradient(circle, #ffe066 0%, #f3ba2f 60%, #947116 100%); border-radius: 50%; border: 6px solid #ffe066; box-shadow: 0 0 35px rgba(243, 186, 47, 0.7); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: transform 0.05s ease; }
        .clicker-circle::after { content: "E"; font-size: 105px; font-weight: 900; color: #ffffff; text-shadow: 0 4px 10px rgba(0, 0, 0, 0.4); }
        .clicker-circle:active { transform: scale(0.95); }
        .floating-text { position: absolute; color: #ffffff; font-size: 28px; font-weight: bold; pointer-events: none; animation: floatUp 0.6s ease-out forwards; text-shadow: 0 3px 6px rgba(0,0,0,0.9); z-index: 50; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.2); } }
        .energy-boost-row { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 15px; }
        .energy-box { font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .boost-link { background: none; border: none; color: #f3ba2f; font-size: 16px; font-weight: bold; cursor: pointer; }
        .tab-title { font-size: 24px; font-weight: bold; color: #f3ba2f; margin-bottom: 8px; text-align: center; }
        .info-card { background: #141414; border: 1px solid #252525; border-radius: 16px; padding: 14px; width: 100%; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .history-list { width: 100%; max-height: 220px; overflow-y: auto; background: #0c0c0c; border-radius: 12px; padding: 10px; border: 1px solid #222; }
        .history-item { font-size: 12px; color: #ccc; padding: 7px 0; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; }
        .upgrade-btn { background: #f3ba2f; color: #000; border: none; padding: 8px 14px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .airdrop-stats { background: rgba(243, 186, 47, 0.05); border: 1px solid #3a2b03; border-radius: 16px; padding: 15px; width: 100%; text-align: center; margin-bottom: 15px; }
        .airdrop-coins { font-size: 28px; font-weight: 800; color: #fff; margin-bottom: 5px; }
        .airdrop-usd { font-size: 16px; color: #00ffcc; font-weight: bold; }
        .wallet-btn { width: 100%; background: #111; border: 2px solid #f3ba2f; border-radius: 14px; padding: 14px; color: #fff; font-size: 15px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .bottom-nav { display: flex; justify-content: space-between; background: #121212; padding: 10px 6px; border-radius: 20px; border: 1px solid #222; width: 100%; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: #666666; font-size: 11px; font-weight: 600; cursor: pointer; }
        .nav-item.active { color: #ffffff; }
        .back-btn { margin-top: 15px; background: #222; color: #fff; border: 1px solid #444; padding: 8px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="top-profile">
            <div class="profile-left">
                <div class="avatar-container">
                    <img id="avatar-preview" class="avatar-img" src="https://ui-avatars.com/api/?name=CEO&background=222222&color=f3ba2f" alt="Profile">
                    <input type="file" id="image-loader" class="file-input" accept="image/*">
                </div>
                <div class="user-meta">
                    <h4 id="username-display">Ezbon (CEO)</h4>
                    <div class="level-container">
                        <span id="level-title-text" class="level-title">Level 1</span>
                        <div class="level-bar-container"><div id="level-bar-fill" class="level-bar-fill" style="width: 25%;"></div></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-exchange" class="tab-content active">
            <div class="balance-box">
                <div class="coin-balance">
                    <div class="gold-coin-icon"></div>
                    <span id="score-text">0</span>
                </div>
            </div>
            <div class="clicker-container" id="clicker-parent">
                <div id="coin-clicker" class="clicker-circle"></div>
            </div>
            <div class="energy-boost-row">
                <div class="energy-box">⚡ <span id="energy-text">1500</span>/1500</div>
                <button class="boost-link" onclick="openBoostSection()">🚀 Boost</button>
            </div>
        </div>

        <div id="tab-mine" class="tab-content">
            <p class="tab-title">Coin History</p>
            <div class="history-list" id="history-container">
                <div class="history-item"><span>Account Initialized</span><span>+0 E-Coin</span></div>
            </div>
        </div>

        <div id="tab-mine-friends" class="tab-content">
            <p class="tab-title">👥 Invite Friends</p>
            <div class="info-card" style="flex-direction: column; gap: 10px;">
                <p id="ref-link-text" style="font-size: 12px; color: #aaa; word-break: break-all;">https://t.me/ECoinBot?start=ref12345</p>
                <button onclick="copyInviteLink()" class="upgrade-btn">📋 Copy Invite Link</button>
            </div>
        </div>

        <div id="tab-earn" class="tab-content">
            <p class="tab-title">🪙 Earn Coins</p>
            <div class="info-card"><p>Daily Reward</p><button class="upgrade-btn" onclick="claimDaily()">Claim</button></div>
        </div>

        <div id="tab-airdrop" class="tab-content">
            <p class="tab-title">Binance Airdrop</p>
            <div class="airdrop-stats">
                <div class="airdrop-coins">🪙 <span id="airdrop-score-display">0</span></div>
                <div class="airdrop-usd">Value: $<span id="airdrop-usd-display">0.00</span></div>
            </div>
            <button class="wallet-btn" onclick="connectBinanceWalletOnly()">🔶 Connect Wallet</button>
        </div>

        <div id="tab-boost-section" class="tab-content">
            <p class="tab-title">🚀 Multitap Boost</p>
            <div class="info-card">
                <div><p>Multitap Upgrade</p><p id="multitap-desc" style="font-size: 11px; color: #888;">Increase coins per click</p></div>
                <button id="btn-buy-boost" class="upgrade-btn" onclick="buyMultitapUpgrade()">💰 100</button>
            </div>
            <button class="back-btn" onclick="goBackToExchange()">◀ Back</button>
        </div>
        
        <div class="bottom-nav">
            <button class="nav-item active" onclick="switchTab('tab-exchange', this)">🪙 Exchange</button>
            <button class="nav-item" onclick="switchTab('tab-mine', this)">📊 History</button>
            <button class="nav-item" onclick="switchTab('tab-mine-friends', this)">👥 Friends</button>
            <button class="nav-item" onclick="switchTab('tab-earn', this)">🪙 Earn</button>
            <button class="nav-item" onclick="switchTab('tab-airdrop', this)">💰 Airdrop</button>
        </div>
    </div>

    <script>
        // Telegram Web App Full Screen Configuration
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.disableVerticalSwipes();

        // Game State & Logic
        let score = parseInt(localStorage.getItem('e_coin_score')) || 0;
        let energy = 1500;
        const scoreText = document.getElementById('score-text');
        const airdropScoreDisplay = document.getElementById('airdrop-score-display');
        const energyText = document.getElementById('energy-text');

        scoreText.textContent = score;
        airdropScoreDisplay.textContent = score;

        // Clicker Event Handler with floating animation
        document.getElementById('coin-clicker').addEventListener('click', (e) => {
            if (energy > 0) {
                score += 1;
                energy -= 1;
                scoreText.textContent = score;
                airdropScoreDisplay.textContent = score;
                energyText.textContent = energy;
                localStorage.setItem('e_coin_score', score);

                // Floating text effect
                const clickerParent = document.getElementById('clicker-parent');
                const rect = clickerParent.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const floatEl = document.createElement('div');
                floatEl.className = 'floating-text';
                floatEl.textContent = '+1';
                floatEl.style.left = `${x}px`;
                floatEl.style.top = `${y}px`;
                clickerParent.appendChild(floatEl);

                setTimeout(() => floatEl.remove(), 600);
            }
        });

        // Tab Navigation Logic
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        function openBoostSection() {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-boost-section').classList.add('active');
        }

        function goBackToExchange() {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-exchange').classList.add('active');
        }

        function claimDaily() {
            score += 50;
            scoreText.textContent = score;
            alert('Daily reward claimed successfully!');
        }

        function copyInviteLink() {
            navigator.clipboard.writeText(document.getElementById('ref-link-text').textContent);
            alert('Invite link copied to clipboard!');
        }

        function connectBinanceWalletOnly() {
            alert('Binance Web3 Wallet connection initiated.');
        }

        function buyMultitapUpgrade() {
            alert('Multitap upgrade processed.');
        }
    </script>
</body>
</html>
